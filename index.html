<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>단어 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --bg2: #ede8de;
  --surface: #ffffff;
  --surface2: #f9f6f0;
  --border: #ddd8ce;
  --border2: #c8c0b0;
  --text: #2c2416;
  --text2: #6b5f4a;
  --text3: #a89880;
  --accent: #c0392b;
  --accent2: #e74c3c;
  --accentbg: rgba(192,57,43,0.08);
  --green: #27ae60;
  --green-bg: rgba(39,174,96,0.1);
  --red: #c0392b;
  --red-bg: rgba(192,57,43,0.08);
  --yellow: #d4870a;
  --navy: #1a2744;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(44,36,22,0.08);
  --shadow2: 0 4px 24px rgba(44,36,22,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

#app { min-height: 100vh; display: flex; flex-direction: column; }
.screen { display: none; flex: 1; flex-direction: column; }
.screen.active { display: flex; }

/* ── LOGIN ── */
#login-screen {
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--bg);
  background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(44,36,22,0.04) 27px, rgba(44,36,22,0.04) 28px),
                    repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(44,36,22,0.04) 27px, rgba(44,36,22,0.04) 28px);
}

.login-card {
  width: 100%;
  max-width: 360px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 32px;
  box-shadow: var(--shadow2);
  text-align: center;
}

.login-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.login-title {
  font-family: 'Playfair Display', serif;
  font-size: 38px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.1;
  margin-bottom: 4px;
}

.login-title span { color: var(--accent); font-style: normal; }

.login-divider {
  width: 40px; height: 2px;
  background: var(--accent);
  margin: 16px auto;
}

.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; }

.text-input {
  width: 100%;
  padding: 12px 16px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  outline: none;
  transition: border-color 0.15s;
  text-align: center;
  letter-spacing: 3px;
  margin-bottom: 12px;
}
.text-input:focus { border-color: var(--accent); }
.text-input::placeholder { letter-spacing: 0; color: var(--text3); font-size: 14px; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 18px;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  width: 100%;
  padding: 13px;
  background: var(--navy);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  border-radius: var(--radius);
  letter-spacing: 1px;
}
.btn-primary:hover { background: #243560; }

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1.5px solid var(--border);
}
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }

.btn-danger {
  background: var(--red-bg);
  color: var(--red);
  border: 1px solid rgba(192,57,43,0.25);
}

.btn-success {
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid rgba(39,174,96,0.25);
}

.btn-accent {
  background: var(--accentbg);
  color: var(--accent);
  border: 1px solid rgba(192,57,43,0.2);
}

.login-hint { font-size: 12px; color: var(--text3); margin-top: 14px; }

.shake { animation: shake 0.4s; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 54px;
  background: var(--navy);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 10;
}

.topbar-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
}

.topbar-right { display: flex; align-items: center; gap: 8px; }

.user-badge {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 4px 10px;
}

.topbar .btn-ghost {
  color: rgba(255,255,255,0.7);
  border-color: rgba(255,255,255,0.2);
  font-size: 12px;
  padding: 5px 10px;
}
.topbar .btn-ghost:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

/* ── CONTENT ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 60px;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
}

/* ── SECTION HEADER ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  margin-top: 24px;
}
.section-header:first-child { margin-top: 0; }

.section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
}

.card-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.card-row:last-child { border-bottom: none; }
.card-row:hover { background: var(--surface2); }
.card-row.no-hover { cursor: default; }
.card-row.no-hover:hover { background: transparent; }

.card-main { font-size: 14px; font-weight: 600; color: var(--text); }
.card-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.card-right { display: flex; align-items: center; gap: 8px; }
.card-arrow { color: var(--text3); font-size: 14px; }

/* wordset card */
.ws-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow 0.15s, border-color 0.15s;
}
.ws-card:hover { box-shadow: var(--shadow2); border-color: var(--border2); }

.ws-card-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
}

.ws-card-icon {
  width: 40px; height: 40px;
  background: var(--navy);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  margin-right: 12px;
}

.ws-card-info { flex: 1; min-width: 0; }
.ws-card-name { font-size: 15px; font-weight: 700; color: var(--text); }
.ws-card-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

.ws-lec-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 0 16px 12px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}

/* ── RECORDS ── */
.record-score { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.score-detail { font-size: 12px; color: var(--text2); }
.score-detail .c { color: var(--green); font-weight: 700; }
.score-detail .w { color: var(--red); font-weight: 700; }
.score-pct { color: var(--navy); font-weight: 800; font-size: 16px; }

/* ── EMPTY ── */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 13px;
  line-height: 2;
}

/* ── QUIZ ── */
#quiz-screen { background: var(--bg); }

.quiz-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px 16px;
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
}

.progress-wrap { margin-bottom: 16px; }
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 6px;
  font-weight: 600;
}
.progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill {
  height: 100%;
  background: var(--navy);
  border-radius: 2px;
  transition: width 0.3s ease;
}

.timer-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.timer-track { flex: 1; height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
.timer-fill { height: 100%; border-radius: 4px; transition: width 0.95s linear, background-color 0.3s; }
.timer-num { font-size: 20px; font-weight: 900; min-width: 20px; text-align: right; color: var(--text); }

.question-box {
  background: var(--navy);
  border-radius: 16px;
  padding: 32px 24px;
  text-align: center;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.question-box::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.q-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }
.q-word {
  font-family: 'Playfair Display', serif;
  font-size: clamp(34px, 9vw, 56px);
  color: #fff;
  line-height: 1.1;
}

.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.choice-btn {
  padding: 14px 12px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color 0.1s, background 0.1s;
  outline: none;
  line-height: 1.4;
  box-shadow: var(--shadow);
}
.choice-btn:not(:disabled):hover { border-color: var(--navy); background: var(--surface2); }
.choice-btn:disabled { cursor: default; }
.choice-btn.correct { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.choice-btn.wrong { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.choice-btn.dimmed { opacity: 0.3; }
.choice-num { font-size: 16px; flex-shrink: 0; opacity: 0.5; }
.choice-btn.correct .choice-num, .choice-btn.wrong .choice-num { opacity: 1; }

.feedback {
  margin-top: 14px;
  padding: 11px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.2s;
}
.feedback.show { opacity: 1; }
.feedback.correct { background: var(--green-bg); color: var(--green); border: 1px solid rgba(39,174,96,0.3); }
.feedback.wrong { background: var(--red-bg); color: var(--red); border: 1px solid rgba(192,57,43,0.3); }

/* ── RESULT ── */
.result-hero {
  background: var(--navy);
  border-radius: 16px;
  padding: 32px 20px 24px;
  text-align: center;
  margin-bottom: 16px;
  color: #fff;
}

.score-circle {
  width: 100px; height: 100px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  position: relative;
}
.score-circle::before {
  content: '';
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  background: var(--navy);
}
.score-inner { position: relative; z-index: 1; text-align: center; }
.score-pct-big { font-family: 'Playfair Display', serif; font-size: 28px; color: #fff; line-height: 1; }
.score-pct-unit { font-size: 14px; color: rgba(255,255,255,0.6); }

.grade-text { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.grade-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 20px; }

.stat-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
.stat-box {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 10px 20px;
  text-align: center;
  min-width: 70px;
}
.stat-n { font-size: 22px; font-weight: 700; color: #fff; }
.stat-l { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 1px; }

.wrong-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.wrong-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.wrong-title { font-size: 13px; font-weight: 700; color: var(--text2); }
.copy-btn {
  font-size: 12px;
  padding: 5px 10px;
  background: var(--surface);
  color: var(--accent);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
}
.copy-btn:hover { border-color: var(--accent); }

.wrong-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.wrong-item:last-child { border-bottom: none; }
.wrong-word { font-weight: 700; color: var(--text); }
.wrong-meaning { color: var(--text2); }

.result-btns { display: flex; gap: 10px; }
.result-btns .btn { flex: 1; padding: 13px; font-size: 14px; font-weight: 700; }

/* ── ADMIN TABS ── */
.admin-tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}
.admin-tab {
  flex: 1;
  padding: 13px 8px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  color: var(--text2);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: color 0.15s;
  white-space: nowrap;
}
.admin-tab.active { color: var(--navy); border-bottom-color: var(--navy); }

/* ── FORM ── */
.form-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.form-input {
  flex: 1;
  min-width: 100px;
  padding: 9px 12px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--navy); }

.form-textarea {
  width: 100%;
  min-height: 200px;
  padding: 12px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.7;
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
}
.form-textarea:focus { border-color: var(--navy); }

.form-hint { font-size: 11px; color: var(--text3); margin-top: 6px; line-height: 1.6; }

.edit-box {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
.edit-box-title { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 12px; }

/* ── BADGE ── */
.badge {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}
.badge-blue { background: rgba(26,39,68,0.08); color: var(--navy); border: 1px solid rgba(26,39,68,0.15); }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-accent { background: var(--accentbg); color: var(--accent); }

/* ── SELECT SCREEN ── */
.select-option {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  margin-bottom: 6px;
  box-shadow: var(--shadow);
  transition: border-color 0.12s, background 0.12s;
}
.select-option:hover { border-color: var(--navy); background: var(--surface2); }
.select-option.selected { border-color: var(--navy); background: rgba(26,39,68,0.05); }

.count-option {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 12px 8px;
  text-align: center;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  transition: all 0.12s;
  box-shadow: var(--shadow);
}
.count-option:hover { border-color: var(--navy); color: var(--navy); }
.count-option.selected { border-color: var(--navy); background: var(--navy); color: #fff; }

/* ── Loading button ── */
.btn-loading {
  position: relative;
  pointer-events: none;
  opacity: 0.75;
}
.btn-loading::after {
  content: '';
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
.btn-loading-dark::after {
  border-color: rgba(0,0,0,0.15);
  border-top-color: var(--navy);
}

/* ── SPINNER ── */
.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--navy);
  color: #fff;
  padding: 10px 20px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: 0 8px 24px rgba(26,39,68,0.3);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width: 420px) {
  .choices { grid-template-columns: 1fr; }
  .login-card { padding: 28px 20px; }
  .stat-box { min-width: 60px; padding: 10px 10px; }
}
</style>
</head>
<body>
<div id="app">

  <!-- 로그인 -->
  <div id="login-screen" class="screen active">
    <div class="login-card">
      <p class="login-eyebrow">Vocabulary Quiz</p>
      <h1 class="login-title">단어 <span>테스트</span></h1>
      <div class="login-divider"></div>
      <p class="login-sub">학생 코드를 입력하고 시작하세요</p>
      <input class="text-input" id="login-input" type="text" placeholder="코드 입력..." autocomplete="off" spellcheck="false">
      <button class="btn btn-primary" onclick="doLogin()">입장하기</button>
      <p class="login-hint">관리자는 관리자 코드로 로그인하세요</p>
    </div>
  </div>

  <!-- 홈 -->
  <div id="home-screen" class="screen" style="flex-direction:column;">
    <div class="topbar">
      <span class="topbar-title">단어 테스트</span>
      <div class="topbar-right">

<div id="toast"></div>

<script>
// ════════════════════════════════════════════
// 설정
// ════════════════════════════════════════════
const CONFIG = {
  ADMIN_CODE: "admin1234",
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbySdBvzlaOWWekngT-I5pXweMaXSMItlor6H09r7rIrDhjhGEV_6mQLPyQZbYuG646Hkw/exec",
  CACHE_TTL: {
    students: 60 * 1000,   // 1분
    wordsets: 60 * 1000,   // 1분
    records: 15 * 1000,    // 15초
    wrongWords: 10 * 1000  // 10초
  }
};

// ════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════
let STATE = {
  user: null,
  wordsets: [],
  students: [],
  records: [],
  wrongWords: [],
  quiz: {
    words: [],
    current: 0,
    correct: 0,
    wrongList: [],
    correctIdx: -1,
    answered: false,
    setName: "",
    timer: null,
    autoTimer: null,
    allWords: [],
    wsId: ""
  }
};

// ════════════════════════════════════════════
// 로컬 저장 / 캐시
// ════════════════════════════════════════════
function lget(k) {
  try { return JSON.parse(localStorage.getItem("vq3_" + k)); }
  catch { return null; }
}

function lset(k, v) {
  try { localStorage.setItem("vq3_" + k, JSON.stringify(v)); }
  catch (e) {}
}

function cget(key) {
  return lget("cache_" + key);
}

function cset(key, data) {
  lset("cache_" + key, {
    ts: Date.now(),
    data
  });
}

function cisFresh(key, ttl) {
  const c = cget(key);
  if (!c || !c.ts) return false;
  return (Date.now() - c.ts) < ttl;
}

function clearCache(key) {
  try { localStorage.removeItem("vq3_cache_" + key); } catch (e) {}
}

function scriptConfigured() {
  return !!CONFIG.SCRIPT_URL;
}

function makeWordsetId(name) {
  return "ws_" + String(name).trim().replace(/\s+/g, "_");
}

// ════════════════════════════════════════════
// 로딩 오버레이
// ════════════════════════════════════════════
function ensureLoadingOverlay() {
  if (document.getElementById("global-loading")) return;

  const style = document.createElement("style");
  style.textContent = `
    #global-loading {
      position: fixed;
      inset: 0;
      background: rgba(26,39,68,0.22);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(2px);
    }
    #global-loading.show {
      display: flex;
    }
    #global-loading .gl-card {
      min-width: 180px;
      max-width: 280px;
      background: #fff;
      border: 1px solid rgba(26,39,68,0.08);
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(26,39,68,0.18);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #global-loading .gl-spinner {
      width: 22px;
      height: 22px;
      border: 2.5px solid #d7dce7;
      border-top-color: #1a2744;
      border-radius: 50%;
      animation: glspin 0.7s linear infinite;
      flex-shrink: 0;
    }
    #global-loading .gl-text {
      font-size: 14px;
      font-weight: 700;
      color: #1a2744;
      line-height: 1.4;
    }
    @keyframes glspin { to { transform: rotate(360deg); } }
  `;
  document.head.appendChild(style);

  const overlay = document.createElement("div");
  overlay.id = "global-loading";
  overlay.innerHTML = `
    <div class="gl-card">
      <div class="gl-spinner"></div>
      <div class="gl-text" id="global-loading-text">불러오는 중...</div>
    </div>
  `;
  document.body.appendChild(overlay);
}

let _busyCount = 0;

function showBusy(text = "불러오는 중...") {
  ensureLoadingOverlay();
  _busyCount++;
  const el = document.getElementById("global-loading");
  const textEl = document.getElementById("global-loading-text");
  if (textEl) textEl.textContent = text;
  if (el) el.classList.add("show");
}

function hideBusy() {
  _busyCount = Math.max(0, _busyCount - 1);
  if (_busyCount > 0) return;
  const el = document.getElementById("global-loading");
  if (el) el.classList.remove("show");
}

async function withBusy(text, fn) {
  showBusy(text);
  try {
    return await fn();
  } finally {
    hideBusy();
  }
}

// ════════════════════════════════════════════
// Apps Script 통신
// ════════════════════════════════════════════
async function scriptGet(action, params = {}) {
  if (!scriptConfigured()) return null;
  try {
    const qs = new URLSearchParams({ action, ...params }).toString();
    const res = await fetch(`${CONFIG.SCRIPT_URL}?${qs}`, { method: "GET" });
    const data = await res.json();
    return data.ok ? data.data : null;
  } catch (e) {
    console.error("scriptGet error:", e);
    return null;
  }
}

async function scriptPost(payload) {
  if (!scriptConfigured()) return false;
  try {
    const res = await fetch(CONFIG.SCRIPT_URL, {
      method: "POST",
      redirect: "follow",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    return !!data.ok;
  } catch (e) {
    console.error("scriptPost error:", e);
    return false;
  }
}

// ════════════════════════════════════════════
// 공통
// ════════════════════════════════════════════
function calcLectures(words) {
  return [...new Set(words.map(w => w.lecture).filter(Boolean))]
    .sort((a, b) => {
      const na = Number(a), nb = Number(b);
      return (!isNaN(na) && !isNaN(nb)) ? na - nb : String(a).localeCompare(String(b));
    });
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
}

function btnLoad(btn, text = "저장 중...") {
  btn.dataset.origText = btn.innerHTML;
  btn.innerHTML = text;
  btn.classList.add("btn-loading");
  if (!btn.classList.contains("btn-primary")) btn.classList.add("btn-loading-dark");
}

function btnDone(btn) {
  if (!btn) return;
  btn.innerHTML = btn.dataset.origText || btn.innerHTML;
  btn.classList.remove("btn-loading", "btn-loading-dark");
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ════════════════════════════════════════════
// 데이터 로드
// forceRemote = true 이면 무조건 서버 우선
// forceRemote = false 이면 캐시 신선하면 캐시 사용
// ════════════════════════════════════════════
async function loadStudents(forceRemote = false) {
  const ttl = CONFIG.CACHE_TTL.students;

  if (!forceRemote && cisFresh("students", ttl)) {
    const cached = cget("students");
    STATE.students = cached?.data || [];
    return;
  }

  if (scriptConfigured()) {
    const data = await scriptGet("getStudents");
    if (data) {
      STATE.students = data;
      lset("students", data);
      cset("students", data);
      return;
    }
  }

  STATE.students = lget("students") || [];
}

async function loadWordsets(forceRemote = false) {
  const ttl = CONFIG.CACHE_TTL.wordsets;
  const el = document.getElementById("wordset-list");

  if (!forceRemote && cisFresh("wordsets", ttl)) {
    const cached = cget("wordsets");
    STATE.wordsets = (cached?.data || []).map(ws => ({
      ...ws,
      id: ws.id || makeWordsetId(ws.name),
      lectures: calcLectures(ws.words || [])
    }));
    renderWordsetList();
    return;
  }

  if (el) el.innerHTML = `<div class="spinner"></div>`;

  if (scriptConfigured()) {
    const data = await scriptGet("getWordsets");
    if (data) {
      STATE.wordsets = data.map(ws => ({
        ...ws,
        id: ws.id || makeWordsetId(ws.name),
        lectures: calcLectures(ws.words || [])
      }));
      lset("wordsets", STATE.wordsets);
      cset("wordsets", STATE.wordsets);
      renderWordsetList();
      return;
    }
  }

  STATE.wordsets = lget("wordsets") || [];
  renderWordsetList();
}

async function loadRecords(forceRemote = false) {
  const local = lget("records") || [];
  const ttl = CONFIG.CACHE_TTL.records;

  if (!forceRemote && cisFresh("records", ttl)) {
    const cached = cget("records");
    const data = cached?.data || [];
    const mergedMap = new Map();

    [...data, ...local].forEach(r => {
      if (r && r.id) mergedMap.set(String(r.id), r);
    });

    STATE.records = [...mergedMap.values()].sort((a, b) => Number(b.id) - Number(a.id));
    lset("records", STATE.records);
    return;
  }

  if (scriptConfigured()) {
    const data = await scriptGet("getRecords");
    if (data) {
      const mergedMap = new Map();

      [...data, ...local].forEach(r => {
        if (r && r.id) mergedMap.set(String(r.id), r);
      });

      STATE.records = [...mergedMap.values()].sort((a, b) => Number(b.id) - Number(a.id));
      lset("records", STATE.records);
      cset("records", STATE.records);
      return;
    }
  }

  STATE.records = [...local].sort((a, b) => Number(b.id) - Number(a.id));
}

async function loadWrongWords(forceRemote = false) {
  if (!STATE.user) return;

  const cacheKey = "wrongWords_" + STATE.user.code;
  const ttl = CONFIG.CACHE_TTL.wrongWords;

  if (!forceRemote && cisFresh(cacheKey, ttl)) {
    const cached = cget(cacheKey);
    STATE.wrongWords = cached?.data || [];
    renderWrongWordsBadge();
    renderWrongWordList(0);
    return;
  }

  if (scriptConfigured()) {
    const data = await scriptGet("getWrongWords", { studentCode: STATE.user.code });
    if (data) {
      STATE.wrongWords = data;
      lset("wrongWords_" + STATE.user.code, data);
      cset(cacheKey, data);
      renderWrongWordsBadge();
      renderWrongWordList(0);
      return;
    }
  }

  STATE.wrongWords = lget("wrongWords_" + STATE.user.code) || [];
  renderWrongWordsBadge();
  renderWrongWordList(0);
}

// ════════════════════════════════════════════
// 로그인
// ════════════════════════════════════════════
async function doLogin() {
  const code = document.getElementById("login-input").value.trim();
  if (!code) return;

  await withBusy("로그인 중...", async () => {
    if (code === CONFIG.ADMIN_CODE) {
      STATE.user = { code, name: "관리자", isAdmin: true };
      showScreen("admin-screen");
      await renderAdmin();
      return;
    }

    await loadStudents(true);
    const found = STATE.students.find(s => s.code === code);

    if (!found) {
      const el = document.getElementById("login-input");
      el.classList.add("shake");
      setTimeout(() => el.classList.remove("shake"), 500);
      el.value = "";
      showToast("❌ 등록되지 않은 코드예요");
      return;
    }

    STATE.user = {
      code: found.code,
      name: found.name,
      isAdmin: false,
      allowedWs: found.allowedWs || null
    };

    document.getElementById("home-user-badge").textContent = found.name;
    showScreen("home-screen");

    await Promise.all([
      loadWordsets(true),
      loadWrongWords(true),
      loadRecords(true)
    ]);

    renderMyRecords();
  });
}

function doLogout() {
  clearTimeout(STATE.quiz.timer);
  clearTimeout(STATE.quiz.autoTimer);
  STATE.user = null;
  document.getElementById("login-input").value = "";
  showScreen("login-screen");
}

async function goHome() {
  showScreen("home-screen");

  if (STATE.user && !STATE.user.isAdmin) {
    renderMyRecords();
    renderWrongWordsBadge();
    renderWrongWordList();

    // 홈 복귀 시에는 무거운 records 재조회 안 함
    await Promise.all([
      loadWordsets(false),
      loadWrongWords(false),
      loadStudents(false)
    ]);

    const latestStudent = STATE.students.find(s => s.code === STATE.user.code);
    if (latestStudent) {
      STATE.user.allowedWs = latestStudent.allowedWs || null;
      document.getElementById("home-user-badge").textContent = latestStudent.name;
    }

    renderMyRecords();
  }
}

// ════════════════════════════════════════════
// 홈
// ════════════════════════════════════════════
function renderWordsetList() {
  const el = document.getElementById("wordset-list");
  if (!el) return;

  if (!STATE.wordsets.length) {
    el.innerHTML = `<div class="empty">등록된 단어장이 없어요<br>관리자에게 문의하세요</div>`;
    return;
  }

  const allowed = STATE.user?.allowedWs || null;
  const visible = allowed ? STATE.wordsets.filter(ws => allowed.includes(ws.id)) : STATE.wordsets;

  if (!visible.length) {
    el.innerHTML = `<div class="empty">접근 가능한 단어장이 없어요<br>관리자에게 문의하세요</div>`;
    return;
  }

  el.innerHTML = visible.map(ws => {
    const hasLec = ws.lectures && ws.lectures.length > 0;
    const lecBadges = hasLec ? ws.lectures.map(lec => {
      const cnt = ws.words.filter(w => String(w.lecture) === String(lec)).length;
      return `<span class="badge badge-blue">${lec}강 ${cnt}개</span>`;
    }).join("") : "";

    return `
      <div class="ws-card" onclick="openSelectScreen('${escapeJs(ws.id)}')">
        <div class="ws-card-inner">
          <div class="ws-card-icon">📖</div>
          <div class="ws-card-info">
            <div class="ws-card-name">${escapeHtml(ws.name)}</div>
            <div class="ws-card-meta">${ws.words.length}개 단어${hasLec ? " · " + ws.lectures.length + "강" : ""}</div>
          </div>
          <span class="card-arrow" style="color:var(--text3);font-size:18px">›</span>
        </div>
        ${hasLec ? `<div class="ws-lec-bar">${lecBadges}</div>` : ""}
      </div>
    `;
  }).join("");
}

function renderMyRecords() {
  const el = document.getElementById("my-records-list");
  if (!el) return;

  const mine = STATE.records
    .filter(r => String(r.studentCode) === String(STATE.user?.code))
    .sort((a, b) => Number(b.id) - Number(a.id))
    .slice(0, 10);

  if (!mine.length) {
    el.innerHTML = `<div class="empty" style="padding:20px 0">아직 기록이 없어요</div>`;
    return;
  }

  el.innerHTML = `
    <div class="card">
      ${mine.map(r => {
        const pct = Math.round((r.correct / r.total) * 100);
        return `
          <div class="card-row no-hover">
            <div>
              <div class="card-main">${escapeHtml(r.setName)}</div>
              <div class="card-sub">${escapeHtml(r.date || "")}</div>
            </div>
            <div class="record-score">
              <span class="score-pct">${pct}%</span>
              <span class="score-detail">정답 <span class="c">${r.correct}개</span> · 오답 <span class="w">${r.wrong}개</span></span>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

// ════════════════════════════════════════════
// 오답 단어장
// ════════════════════════════════════════════
let _wrongPage = 0;
const WRONG_PAGE_SIZE = 20;

function toggleWrongWordsSection() {
  const list = document.getElementById("wrong-words-list");
  const acts = document.getElementById("wrong-words-actions");
  const isHidden = list.style.display === "none";
  list.style.display = isHidden ? "block" : "none";
  if (acts) acts.style.display = isHidden && STATE.wrongWords.length > 0 ? "flex" : "none";
  if (isHidden) renderWrongWordList();
}

function renderWrongWordsBadge() {
  const badge = document.getElementById("wrong-words-badge");
  if (badge) badge.textContent = STATE.wrongWords.length + "개";

  const list = document.getElementById("wrong-words-list");
  const acts = document.getElementById("wrong-words-actions");

  if (acts) acts.style.display = STATE.wrongWords.length > 0 ? "flex" : "none";

  if (list && list.style.display !== "none") renderWrongWordList();
}

function renderWrongWordList(page) {
  if (page !== undefined) _wrongPage = page;

  const el = document.getElementById("wrong-words-list");
  const acts = document.getElementById("wrong-words-actions");
  if (!el) return;

  if (!STATE.wrongWords.length) {
    el.innerHTML = `<div class="empty" style="padding:16px 0;font-size:13px">아직 틀린 단어가 없어요 🎉</div>`;
    if (acts) acts.style.display = "none";
    return;
  }

  if (acts) acts.style.display = "flex";

  const total = STATE.wrongWords.length;
  const totalPages = Math.ceil(total / WRONG_PAGE_SIZE);
  const start = _wrongPage * WRONG_PAGE_SIZE;
  const pageWords = STATE.wrongWords.slice(start, start + WRONG_PAGE_SIZE);

  const pageNav = totalPages > 1 ? `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border);background:var(--surface2)">
      <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px" onclick="renderWrongWordList(${_wrongPage - 1})" ${_wrongPage === 0 ? "disabled style='opacity:0.3;pointer-events:none'" : ""}>← 이전</button>
      <span style="font-size:12px;color:var(--text2);font-weight:600">${_wrongPage + 1} / ${totalPages} 페이지 (총 ${total}개)</span>

async function deleteWrongWord(word) {

      studentCode: STATE.user.code,
      word

      return;

    clearCache("wrongWords_" + STATE.user.code);
    await loadWrongWords(true);

async function mergeWrongWords(newWrongs) {
  if (!STATE.user || !newWrongs.length) return false;

  const userCode = STATE.user.code;
  const merged = [...STATE.wrongWords];
  const now = new Date().toLocaleString("ko-KR");

  newWrongs.forEach(w => {
    const idx = merged.findIndex(x => x.word === w.word);
    const item = {
      word: w.word || "",
      meaning: w.meaning || "",
      lecture: w.lecture || "",
      date: now
    };
    if (idx >= 0) merged[idx] = item;
    else merged.push(item);
  });

  const ok = await scriptPost({
    action: "saveWrongWords",
    studentCode: userCode,
    words: merged
  });

  if (!ok) return false;

  STATE.wrongWords = merged;
  lset("wrongWords_" + userCode, merged);
  cset("wrongWords_" + userCode, merged);
  renderWrongWordsBadge();
  renderWrongWordList(0);
  return true;
}

function startWrongWordsQuiz() {
  if (!STATE.wrongWords.length) {
    showToast("오답 단어가 없어요");
    return;
  }

  const allWords = STATE.wordsets.flatMap(ws => ws.words);
  const fakeWs = {
    id: "wrong",
    name: "오답 단어장",
    words: allWords.length ? allWords : STATE.wrongWords
  };

  _doStartQuiz(STATE.wrongWords, "오답 단어 테스트", fakeWs, STATE.wrongWords.length);
}

function toggleAllLec(cb) {

function onLecChange() {

function selectCount(v) {

    const el = document.getElementById("cnt-" + k);

function confirmStart(wsId) {
  const ws = STATE.wordsets.find(w => w.id === wsId);
  if (!ws) return;

  const hasLec = ws.lectures && ws.lectures.length > 0;
  const lecCbs = [...document.querySelectorAll(".lec-cb:checked")].map(c => c.value);

  let words = ws.words;
  let label = ws.name;

  if (hasLec && lecCbs.length > 0 && lecCbs.length < ws.lectures.length) {
    words = ws.words.filter(w => lecCbs.includes(String(w.lecture)));
    label = lecCbs.length === 1
      ? `${ws.name} ${lecCbs[0]}강`
      : `${ws.name} ${lecCbs[0]}~${lecCbs[lecCbs.length - 1]}강`;
  } else if (hasLec) {
    label = ws.name + " 전체";
  }

  if (words.length < 4) {
    showToast("선택한 범위의 단어가 너무 적어요 (최소 4개)");
    return;
  }

  const cnt = window._selectedCount;
  let limit = cnt === "all" ? words.length : parseInt(cnt, 10);
  if (limit > words.length) limit = words.length;

  _doStartQuiz(words, label, ws, limit);
}

// ════════════════════════════════════════════
// 퀴즈
// ════════════════════════════════════════════
function _doStartQuiz(words, label, ws, limit) {
  const q = STATE.quiz;
  const max = limit || Math.min(words.length, 30);

  q.words = shuffle(words).slice(0, max);
  q.allWords = ws.words;
  q.wsId = ws.id;
  q.current = 0;
  q.correct = 0;
  q.wrongList = [];
  q.setName = label;
  q.correctIdx = -1;
  q.answered = false;

  document.getElementById("quiz-topbar-title").textContent = label;
  showScreen("quiz-screen");
  renderQuestion();
}

function renderQuestion() {
  const q = STATE.quiz;
  const word = q.words[q.current];
  const total = q.words.length;

  document.getElementById("q-progress").textContent = `${q.current + 1} / ${total}`;
  document.getElementById("q-correct-count").textContent = `✓ ${q.correct}`;
  document.getElementById("q-progress-fill").style.width = `${(q.current / total) * 100}%`;
  document.getElementById("q-word").textContent = word.word;
  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").textContent = "";

  let pool = (q.allWords || STATE.wordsets.flatMap(ws => ws.words))
    .filter(w => w.meaning !== word.meaning);

  if (pool.length < 3) {
    pool = STATE.wordsets.flatMap(ws => ws.words).filter(w => w.word !== word.word);
  }

  const distractors = shuffle(pool).slice(0, 3);
  q.choices = shuffle([word, ...distractors]);
  q.correctIdx = q.choices.findIndex(c => c.meaning === word.meaning);
  q.answered = false;

  const nums = ["①", "②", "③", "④"];
  document.getElementById("choices").innerHTML = q.choices.map((c, i) => `
    <button class="choice-btn" onclick="pickAnswer(${i})">
      <span class="choice-num">${nums[i]}</span><span>${escapeHtml(c.meaning)}</span>
    </button>
  `).join("");

  clearTimeout(q.timer);
  clearTimeout(q.autoTimer);

  let t = 5;
  const fill = document.getElementById("timer-fill");
  const num = document.getElementById("timer-num");
  fill.style.transition = "none";
  fill.style.width = "100%";
  fill.style.backgroundColor = "var(--green)";
  num.textContent = t;

  setTimeout(() => {
    fill.style.transition = "width 0.95s linear, background-color 0.3s";
    tick();
  }, 50);

  function tick() {
    if (q.answered) return;
    t--;
    num.textContent = t;
    fill.style.width = `${(t / 5) * 100}%`;
    fill.style.backgroundColor = t <= 1 ? "var(--red)" : t <= 2 ? "var(--yellow)" : "var(--green)";
    if (t <= 0) {
      pickAnswer(null);
      return;
    }
    q.timer = setTimeout(tick, 1000);
  }
}

function pickAnswer(idx) {
  const q = STATE.quiz;
  if (q.answered) return;

  q.answered = true;
  clearTimeout(q.timer);

  const word = q.words[q.current];
  const isCorrect = idx !== null && idx === q.correctIdx;
  if (isCorrect) q.correct++;
  else q.wrongList.push(word);

  document.querySelectorAll(".choice-btn").forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correctIdx) btn.classList.add("correct");
    else if (i === idx && !isCorrect) btn.classList.add("wrong");
    else btn.classList.add("dimmed");
  });

  const fb = document.getElementById("feedback");
  if (idx === null) {
    fb.textContent = "⏰ 시간 초과!";
    fb.className = "feedback wrong show";
  } else if (isCorrect) {
    fb.textContent = "✅ 정답!";
    fb.className = "feedback correct show";
  } else {
    fb.textContent = `❌ 오답  |  정답: ${word.meaning}`;
    fb.className = "feedback wrong show";
  }

  q.autoTimer = setTimeout(() => {
    q.current++;
    if (q.current >= q.words.length) finishQuiz();
    else renderQuestion();
  }, 1000);
}

function exitQuiz() {
  clearTimeout(STATE.quiz.timer);
  clearTimeout(STATE.quiz.autoTimer);
  goHome();
}

async function saveRecord(rec) {
  const current = lget("records") || [];
  const mergedMap = new Map();

  [rec, ...current, ...STATE.records].forEach(r => {
    if (r && r.id) mergedMap.set(String(r.id), r);
  });

  STATE.records = [...mergedMap.values()].sort((a, b) => Number(b.id) - Number(a.id));
  lset("records", STATE.records);
  cset("records", STATE.records);

  const ok = await scriptPost({ action: "saveRecord", record: rec });

  if (!ok) {
    console.error("saveRecord failed");
    return false;
  }

  return true;
}

async function finishQuiz() {
  const q = STATE.quiz;
  const total = q.words.length;
  const userCode = STATE.user.code;

  const rec = {
    id: Date.now().toString(),
    studentCode: userCode,
    studentName: STATE.user.name,
    setName: q.setName,
    total,
    correct: q.correct,
    wrong: total - q.correct,
    wrongWords: q.wrongList,
    date: new Date().toLocaleString("ko-KR"),
  };

  renderResult(rec);
  showScreen("result-screen");

  showBusy("결과 저장 중...");

  try {
    const recordSaved = await saveRecord(rec);
    if (!recordSaved) showToast("⚠️ 기록 저장에 실패했어요");

    if (q.wsId === "wrong") {
      await loadWrongWords(true);

      const correctWords = q.words.filter(w => !q.wrongList.find(x => x.word === w.word));
      const remaining = STATE.wrongWords.filter(x => !correctWords.find(cw => cw.word === x.word));

      const ok = await scriptPost({
        action: "saveWrongWords",
        studentCode: userCode,
        words: remaining
      });

      if (ok) {
        STATE.wrongWords = remaining;
        lset("wrongWords_" + userCode, remaining);
        cset("wrongWords_" + userCode, remaining);
        renderWrongWordsBadge();
        renderWrongWordList(0);
      } else {
        showToast("⚠️ 오답 단어장 갱신에 실패했어요");
      }
    }

    if (q.wsId !== "wrong" && q.wrongList.length > 0) {
      await loadWrongWords(true);
      const ok = await mergeWrongWords(q.wrongList);
      if (!ok) showToast("⚠️ 오답 단어장 저장에 실패했어요");
    }
  } finally {
    hideBusy();
  }
}

        </div>
        ${rec.wrongWords.map(w => `
          <div class="wrong-item">
            <span class="wrong-word">${escapeHtml(w.word)}</span>
            <span class="wrong-meaning">${escapeHtml(w.meaning)}</span>

        `).join("")}

    <div class="result-btns" style="flex-wrap:wrap">

function startWrongOnlyQuiz() {
  const words = STATE.quiz.wrongList;
  if (!words || words.length < 1) {
    showToast("틀린 단어가 없어요!");
    return;
  }

  const allWords = STATE.wordsets.flatMap(ws => ws.words);
  const pool = allWords.length >= 4 ? allWords : words;
  const fakeWs = { id: STATE.quiz.wsId, name: STATE.quiz.setName, words: pool };
  _doStartQuiz(words, "오답 재시험", fakeWs, words.length);
}

function copyWrong(rec) {
  const pct = Math.round((rec.correct / rec.total) * 100);

  // 만점일 때
  if (rec.wrong === 0) {
    const text = `${rec.studentName} 학생이, ${rec.setName}을 전부 만점으로 통과하였습니다. 축하합니다.`;
    clipCopy(text, "📋 만점 결과를 클립보드에 복사했어요!");
    return;
  }

  // 오답이 있을 때
  const text = [
    `[단어 테스트 결과] ${rec.setName} — ${rec.date}`,
    `${rec.studentName} 학생`,
    `총 ${rec.total}문제 | 정답 ${rec.correct}개 | 오답 ${rec.wrong}개 | ${pct}%`,
    "",
    "틀린 단어:",
    ...rec.wrongWords.map(w => `• ${w.word} = ${w.meaning}`)
  ].join("\n");

  clipCopy(text, "📋 클립보드에 복사했어요!");
}

function clipCopy(text, msg) {
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast(msg)).catch(() => fallbackCopy(text, msg));
  } else {
    fallbackCopy(text, msg);
  }
}

function fallbackCopy(text, msg) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();

  try {
    document.execCommand("copy");
    showToast(msg);
  } catch {
    showToast("복사 실패 — 직접 선택해주세요");
  }

  document.body.removeChild(ta);
}

function parseWordsText(raw, lecture) {
  return raw
    .split("\n")
    .map(line => line.trim())
    .filter(Boolean)
    .map(line => {
      let word = "";
      let meaning = "";

      // 1) 등호 구분: apple = 사과
      if (line.includes("=")) {
        const parts = line.split("=");
        word = parts[0]?.trim() || "";
        meaning = parts.slice(1).join("=").trim();
      }
      // 2) 탭 구분: apple[TAB]사과
      else if (line.includes("\t")) {
        const parts = line.split("\t");
        word = parts[0]?.trim() || "";
        meaning = parts.slice(1).join(" ").trim();
      }
      // 3) 쉼표 구분: apple, 사과
      else if (line.includes(",")) {
        const parts = line.split(",");
        word = parts[0]?.trim() || "";
        meaning = parts.slice(1).join(",").trim();
      }
      // 4) 그 외는 무효 처리
      else {
        return null;
      }

      if (!word || !meaning) return null;

      return {
        word,
        meaning,
        lecture: lecture || ""
      };
    })
    .filter(Boolean);
}

async function saveWs() {
  const name = document.getElementById("ws-name-input").value.trim();
  const lecRaw = document.getElementById("ws-lec-input").value.trim();
  const lecture = lecRaw;
  const newWords = parseWordsText(document.getElementById("ws-words-input").value, lecture);

  if (!name) {
    showToast("단어장 이름을 입력하세요");
    return;
  }
  if (newWords.length < 1) {
    showToast("단어를 입력하세요");
    return;
  }

  const saveBtn = document.querySelector("#ws-editor-wrap .btn-success");
  if (saveBtn) btnLoad(saveBtn, "저장 중...");

  let finalWords = [];

  if (editingWsId) {
    const ws = STATE.wordsets.find(w => w.id === editingWsId);
    if (!ws) {
      btnDone(saveBtn);
      showToast("❌ 기존 단어장을 찾을 수 없어요");
      return;
    }

    if (editingLec) {
      const otherWords = ws.words.filter(w => String(w.lecture) !== String(editingLec));
      finalWords = [...otherWords, ...newWords];
    } else if (lecture) {
      const otherWords = ws.words.filter(w => String(w.lecture) !== String(lecture));
      finalWords = [...otherWords, ...newWords];
    } else {
      finalWords = newWords;
    }
  } else {
    const existing = STATE.wordsets.find(w => w.name === name);
    if (existing) {
      const otherWords = lecture
        ? existing.words.filter(w => String(w.lecture) !== String(lecture))
        : existing.words;
      finalWords = [...otherWords, ...newWords];
    } else {
      finalWords = newWords;
    }
  }

  await withBusy("단어장 저장 중...", async () => {
    const ok = await scriptPost({
      action: "saveWordset",
      name,
      words: finalWords
    });

    if (!ok) {
      btnDone(saveBtn);
      showToast("❌ 시트 저장 실패");
      return;
    }

    clearCache("wordsets");
    await loadWordsets(true);
    document.getElementById("ws-editor-wrap").innerHTML = "";
    renderAdminWordsets();
    btnDone(saveBtn);
    showToast("✅ 단어장 저장됐어요!");
  });
}

function escapeHtml(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function escapeJs(str) {
  return String(str ?? "")
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")
    .replace(/"/g, '\\"');
}

  renderAdminWordsets();

}

// 워크시트 UI 상태 읽기
function getWorksheetUiStateFromDom() {
  const wsSel = document.getElementById("worksheet-wordset");
  const countSel = document.getElementById("worksheet-count");
  const typeSel = document.getElementById("worksheet-type");
  const layoutSel = document.getElementById("worksheet-layout");
  const densitySel = document.getElementById("worksheet-density");
  const answerStyleSel = document.getElementById("worksheet-answer-style");
  const titlePresetSel = document.getElementById("worksheet-title-preset");
  const customTitleInput = document.getElementById("worksheet-custom-title");
  const orderModeSel = document.getElementById("worksheet-order-mode");
  const includeAnswerSheetCb = document.getElementById("worksheet-include-answer");
  const lecCbs = [...document.querySelectorAll(".worksheet-lec-cb:checked")];

  if (!wsSel || !countSel || !typeSel) return null;

  return {
    wordsetId: wsSel.value,
    count: countSel.value,
    type: typeSel.value,
    layout: layoutSel ? layoutSel.value : "2",
    questionDensity: densitySel ? densitySel.value : "normal",
    answerStyle: answerStyleSel ? answerStyleSel.value : "compact",
    titlePreset: titlePresetSel ? titlePresetSel.value : "default",
    customTitle: customTitleInput ? customTitleInput.value.trim() : "",
    orderMode: orderModeSel ? orderModeSel.value : "keep",
    includeAnswerSheet: includeAnswerSheetCb ? includeAnswerSheetCb.checked : true,
    selectedLectures: lecCbs.map(cb => cb.value)
  };
}

function worksheetOnTitlePresetChange() {
  const preset = document.getElementById("worksheet-title-preset")?.value || "default";
  WORKSHEET_STATE.titlePreset = preset;
  renderAdminWorksheets(true);
}

function getWorksheetTitleText(type, wsName, titlePreset, customTitle) {
  let chosen = "";

  if (titlePreset === "custom") {
    chosen = (customTitle || "").trim();
  } else if (titlePreset === "word_test") {
    chosen = "단어 테스트";
  } else if (titlePreset === "check_sheet") {
    chosen = "단어 확인지";
  } else if (titlePreset === "memory_check") {
    chosen = "암기 점검";
  } else if (titlePreset === "vocab_test") {
    chosen = "어휘 테스트";
  }

  if (!chosen) {
    if (type === "wordbook") return `${wsName} 단어장`;
    if (type === "answer_key") return `${wsName} 정답지`;
    return `${wsName} 단어 테스트`;
  }

  if (type === "wordbook") {
    return `${wsName} 단어장`;
  }

  if (type === "answer_key") {
    return `${wsName} ${chosen} 정답지`;
  }

  return `${wsName} ${chosen}`;
}
  
function worksheetOnWordsetChange() {
  const state = getWorksheetUiStateFromDom();
  if (state) {
    WORKSHEET_STATE.wordsetId = state.wordsetId;
    WORKSHEET_STATE.count = state.count;
    WORKSHEET_STATE.type = state.type;
    WORKSHEET_STATE.layout = state.layout || "2";
    WORKSHEET_STATE.questionDensity = state.questionDensity || "normal";
    WORKSHEET_STATE.answerStyle = state.answerStyle || "compact";
    WORKSHEET_STATE.titlePreset = state.titlePreset || "default";
    WORKSHEET_STATE.customTitle = state.customTitle || "";
    WORKSHEET_STATE.orderMode = state.orderMode || "keep";
    WORKSHEET_STATE.includeAnswerSheet = state.includeAnswerSheet !== false;
    WORKSHEET_STATE.selectedLectures = [];
  }
  renderAdminWorksheets(false);
}
  
function worksheetOnOptionChange() {
  const state = getWorksheetUiStateFromDom();
  if (state) WORKSHEET_STATE = state;
}

function toggleWorksheetAllLectures(cb) {
  document.querySelectorAll(".worksheet-lec-cb").forEach(x => x.checked = cb.checked);

function onWorksheetLectureChange() {
  const all = document.querySelectorAll(".worksheet-lec-cb");

  worksheetOnOptionChange();

function getWorksheetSelection() {
  const wsId = document.getElementById("worksheet-wordset")?.value || WORKSHEET_STATE.wordsetId;
  const count = document.getElementById("worksheet-count")?.value || WORKSHEET_STATE.count;
  const type = document.getElementById("worksheet-type")?.value || WORKSHEET_STATE.type;
  const layout = document.getElementById("worksheet-layout")?.value || WORKSHEET_STATE.layout || "2";
  const questionDensity = document.getElementById("worksheet-density")?.value || WORKSHEET_STATE.questionDensity || "normal";
  const answerStyle = document.getElementById("worksheet-answer-style")?.value || WORKSHEET_STATE.answerStyle || "compact";
  const titlePreset = document.getElementById("worksheet-title-preset")?.value || WORKSHEET_STATE.titlePreset || "default";
  const customTitle = document.getElementById("worksheet-custom-title")?.value?.trim() || WORKSHEET_STATE.customTitle || "";
  const orderMode = document.getElementById("worksheet-order-mode")?.value || WORKSHEET_STATE.orderMode || "keep";
  const includeAnswerSheet = document.getElementById("worksheet-include-answer")?.checked ?? WORKSHEET_STATE.includeAnswerSheet ?? true;

  const ws = STATE.wordsets.find(w => w.id === wsId);
  if (!ws) return null;

  const checkedLectures = [...document.querySelectorAll(".worksheet-lec-cb:checked")].map(cb => cb.value);
  let words = ws.words;

  if ((ws.lectures || []).length && checkedLectures.length && checkedLectures.length < ws.lectures.length) {
    words = ws.words.filter(w => checkedLectures.includes(String(w.lecture)));
  }

  const limit = count === "all" ? words.length : Math.min(parseInt(count, 10), words.length);
  words = words.slice(0, limit);

  if (orderMode === "shuffle" && type !== "wordbook") {
    words = shuffle(words);
  }

  const lectureLabel = (ws.lectures || []).length
    ? (checkedLectures.length === ws.lectures.length || checkedLectures.length === 0
        ? "전체"
        : checkedLectures.length === 1
          ? `${checkedLectures[0]}강`
          : `${checkedLectures[0]}~${checkedLectures[checkedLectures.length - 1]}강`)
    : "전체";

  return {
    ws,
    type,
    count,
    layout,
    questionDensity,
    answerStyle,
    titlePreset,
    customTitle,
    orderMode,
    includeAnswerSheet,
    words,
    lectureLabel,
    title: `${ws.name} ${lectureLabel}`,
    total: words.length
  };
}
  
function buildWorksheetDocument(selection) {
  const { ws, type, words, lectureLabel, title, total, layout, questionDensity, answerStyle } = selection;
  const now = new Date().toLocaleDateString("ko-KR");

  const colCount = (type === "wordbook" || type === "word_to_meaning" || type === "meaning_to_word")
    ? Number(layout || 2)
    : 1;

  function chunkIntoColumns(arr, cols) {
    const rowsPerCol = Math.ceil(arr.length / cols);
    const result = [];
    for (let c = 0; c < cols; c++) {
      result.push(arr.slice(c * rowsPerCol, (c + 1) * rowsPerCol));
    }
    return result;
  }

  function chunkBySize(arr, size) {
    const out = [];
    for (let i = 0; i < arr.length; i += size) {
      out.push(arr.slice(i, i + size));
    }
    return out;
  }

  const TEST_PAGE_SIZE_MAP = {
    "1_wide": 10,
    "1_normal": 12,
    "1_compact": 15,
    "2_wide": 16,
    "2_normal": 20,
    "2_compact": 24,
    "3_wide": 18,
    "3_normal": 24,
    "3_compact": 30
  };

  function getFixedTestPageSize(cols, density) {
    return TEST_PAGE_SIZE_MAP[`${cols}_${density}`] || 20;
  }

  let testPromptFont = "14px";
  let testPromptMargin = "12px";
  let answerHeight = "28px";
  let testItemPadding = "10px 12px 12px 12px";
  let testGap = "10px";
  let headerPadding = "14px 16px 14px";
  let headerMarginBottom = "12px";
  let titleFont = "20px";
  let metaFont = "12px";

  if (questionDensity === "wide") {
    testPromptFont = "14px";
    testPromptMargin = "14px";
    answerHeight = "34px";
    testItemPadding = "12px 14px 14px 14px";
    testGap = "12px";
  } else if (questionDensity === "compact") {
    testPromptFont = "12px";
    testPromptMargin = "8px";
    answerHeight = "20px";
    testItemPadding = "7px 9px 9px 9px";
    testGap = "8px";
    headerPadding = "12px 14px 12px";
    headerMarginBottom = "10px";
    titleFont = "18px";
    metaFont = "11px";
  }

  const headerTitle = getWorksheetTitleText(
    type,
    ws.name,
    selection.titlePreset,
    selection.customTitle
  );

  const wordbookColumns = chunkIntoColumns(words, colCount);

  function renderHeader(pageNo, totalPages, customTitleText) {
    return `
      <div class="header">
        <div class="brand-row">
          <div class="brand-type">에이닷 영어학원 WORKSHEET</div>
        </div>

        <div class="title">${escapeHtml(customTitleText)}</div>

        <div class="meta">
          <span>범위: ${escapeHtml(title)}</span>
          <span>문항/단어 수: ${total}개</span>
          <span>출력일: ${escapeHtml(now)}</span>
          ${(type === "wordbook" || type === "word_to_meaning" || type === "meaning_to_word") ? `<span>배치: ${colCount}열</span>` : ``}
          ${(type === "word_to_meaning" || type === "meaning_to_word") ? `<span>문항 크기: ${questionDensity === "wide" ? "넉넉형" : questionDensity === "compact" ? "압축형" : "보통형"}</span>` : ``}
          ${type === "answer_key" ? `<span>형식: ${answerStyle === "compact" ? "compact" : "기본형"}</span>` : ``}
          ${type !== "wordbook" ? `<span>순서: ${selection.orderMode === "shuffle" ? "무작위 배열" : "순서 유지"}</span>` : ``}
        </div>

        ${(type === "word_to_meaning" || type === "meaning_to_word") ? `
          <div class="name-row">
            <div class="name-group">
              <div>이름</div>
              <div class="name-line"></div>
            </div>
            <div class="score-group">
              <div>점수</div>
              <div class="score-line"></div>
            </div>
          </div>
        ` : ``}
      </div>
    `;
  }

  function renderFooter(pageNo, totalPages) {
    return `
      <div class="footer-note">
        <div>에이닷 영어학원</div>
        <div>${escapeHtml(ws.name)} · ${escapeHtml(lectureLabel)} · 총 ${total}개 · ${pageNo}/${totalPages}</div>
      </div>
    `;
  }

  function renderBasicAnswerPages(answerWords, answerTitleText) {
    return `
      <div class="page answer-page">
        ${renderHeader(1, 1, answerTitleText)}
        <div class="answer-key-list">
          ${answerWords.map((w, i) => `
            <div class="ak-item">
              <div class="ak-q"><span class="num">${i + 1}.</span> ${escapeHtml(w.word)}</div>
              <div class="ak-a">${escapeHtml(w.meaning)}</div>
            </div>
          `).join("")}
        </div>
        ${renderFooter(1, 1)}
      </div>
    `;
  }

  function renderCompactAnswerPages(answerWords, answerTitleText) {
    const compactCols = answerWords.length >= 60 ? 3 : 2;
    const compactChunks = chunkIntoColumns(answerWords, compactCols);

    return `
      <div class="page answer-page">
        ${renderHeader(1, 1, answerTitleText)}
        <div class="compact-answer-wrap cols-${compactCols}">
          ${compactChunks.map((chunk, chunkIdx) => `
            <div class="compact-answer-col">
              ${chunk.map((w, i) => {
                const no = chunkIdx * Math.ceil(answerWords.length / compactCols) + i + 1;
                return `
                  <div class="compact-answer-item">
                    <span class="compact-no">${no}.</span>
                    <span class="compact-word">${escapeHtml(w.word)}</span>
                    <span class="compact-dash">-</span>
                    <span class="compact-meaning">${escapeHtml(w.meaning)}</span>
                  </div>
                `;
              }).join("")}
            </div>
          `).join("")}
        </div>
        ${renderFooter(1, 1)}
      </div>
    `;
  }

  let bodyHtml = "";

  if (type === "wordbook") {
    bodyHtml = `
      <div class="page">
        ${renderHeader(1, 1, headerTitle)}
        <div class="wordbook-columns cols-${colCount}">
          ${wordbookColumns.map((col, colIdx) => `
            <table class="wordbook-table">
              <thead>
                <tr>
                  <th style="width:38%">단어</th>
                  <th>뜻</th>
                </tr>
              </thead>
              <tbody>
                ${col.map((w, i) => {
                  const no = colIdx * Math.ceil(words.length / colCount) + i + 1;
                  return `
                    <tr>
                      <td class="wb-word"><span class="num">${no}.</span> ${escapeHtml(w.word)}</td>
                      <td class="wb-meaning">${escapeHtml(w.meaning)}</td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          `).join("")}
        </div>
        ${renderFooter(1, 1)}
      </div>
    `;
  }

  if (type === "word_to_meaning" || type === "meaning_to_word") {
    const pageSize = getFixedTestPageSize(colCount, questionDensity);
    const pages = chunkBySize(words, pageSize);

    const testPagesHtml = pages.map((pageWords, pageIdx) => {
      const pageNo = pageIdx + 1;
      const totalPages = pages.length;
      const pageColumns = chunkIntoColumns(pageWords, colCount);

      return `
        <div class="page">
          ${renderHeader(pageNo, totalPages, headerTitle)}
          <div class="test-columns cols-${colCount}">
            ${pageColumns.map((col, colIdx) => `
              <div class="test-col">
                <div class="test-list">
                  ${col.map((w, i) => {
                    const no = pageIdx * pageSize + colIdx * Math.ceil(pageWords.length / colCount) + i + 1;
                    const promptText = type === "word_to_meaning" ? w.word : w.meaning;
                    return `
                      <div class="test-item">
                        <div class="prompt"><span class="num">${no}.</span> ${escapeHtml(promptText)}</div>
                        <div class="answer-line"></div>
                      </div>
                    `;
                  }).join("")}
                </div>
              </div>
            `).join("")}
          </div>
          ${renderFooter(pageNo, totalPages)}
        </div>
      `;
    }).join("");

    let answerPagesHtml = "";
    if (selection.includeAnswerSheet) {
      const answerTitleText = `${headerTitle} 정답지`;
      answerPagesHtml = answerStyle === "basic"
        ? renderBasicAnswerPages(words, answerTitleText)
        : renderCompactAnswerPages(words, answerTitleText);
    }

    bodyHtml = testPagesHtml + answerPagesHtml;
  }

  if (type === "answer_key") {
    const answerTitleText = headerTitle;
    bodyHtml = answerStyle === "basic"
      ? renderBasicAnswerPages(words, answerTitleText)
      : renderCompactAnswerPages(words, answerTitleText);
  }

  return `
<!DOCTYPE html>

  .page {

  .title {
    font-size: ${titleFont};
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
    color: #111;
  }

  .meta {
    font-size: ${metaFont};
    color: #333;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .meta span {
    white-space: nowrap;
  }

  .name-row {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    gap: 16px;
    font-size: 12px;
    align-items: center;
  }

  .name-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }

    flex: 1;

    min-height: 18px;
  }

  .score-group {
    display: flex;

    gap: 8px;
    width: 140px;
  }

  .score-line {
    flex: 1;
    border-bottom: 1px solid #333;
    min-height: 18px;
  }

  .wordbook-columns,
  .test-columns {
    display: grid;

function buildWorksheetText(selection) {
  const { ws, type, words, lectureLabel } = selection;

  if (type === "wordbook") {
    return [
      `[${ws.name} 단어장] ${lectureLabel}`,
      "",
      ...words.map((w, i) => `${i + 1}. ${w.word} - ${w.meaning}`)
    ].join("\n");
  }

  if (type === "word_to_meaning") {
    return [
      `[${ws.name} 단어 테스트] 단어 보고 뜻 쓰기 (${lectureLabel})`,
      "",
      ...words.map((w, i) => `${i + 1}. ${w.word} : ____________________`)
    ].join("\n");
  }

  if (type === "meaning_to_word") {
    return [
      `[${ws.name} 단어 테스트] 뜻 보고 단어 쓰기 (${lectureLabel})`,
      "",
      ...words.map((w, i) => `${i + 1}. ${w.meaning} : ____________________`)
    ].join("\n");
  }

  return [
    `[${ws.name} 정답지] ${lectureLabel}`,
    "",
    ...words.map((w, i) => `${i + 1}. ${w.word} - ${w.meaning}`)
  ].join("\n");
}

async function previewWorksheet() {
  const selection = getWorksheetSelection();
  if (!selection || !selection.words.length) {
    showToast("출력할 단어가 없어요");
    return;
  }

  await withBusy("미리보기를 만드는 중...", async () => {
    const html = buildWorksheetDocument(selection);
    const frame = document.getElementById("worksheet-preview-frame");
    if (frame) frame.srcdoc = html;
  });
}

async function printWorksheet() {
  const selection = getWorksheetSelection();
  if (!selection || !selection.words.length) {
    showToast("출력할 단어가 없어요");
    return;
  }

  await withBusy("인쇄용 문서를 준비하는 중...", async () => {
    const html = buildWorksheetDocument(selection);
    const win = window.open("", "_blank");
    if (!win) {
      showToast("팝업이 차단됐어요");
      return;
    }

    win.document.open();
    win.document.write(html);
    win.document.close();

    setTimeout(() => {
      try {
        win.focus();
        win.print();
      } catch (e) {
        console.error(e);
      }
    }, 700);
  });
}

async function copyWorksheetText() {
  const selection = getWorksheetSelection();
  if (!selection || !selection.words.length) {
    showToast("복사할 단어가 없어요");
    return;
  }

  const text = buildWorksheetText(selection);
  clipCopy(text, "📋 워크시트를 클립보드에 복사했어요!");
}
