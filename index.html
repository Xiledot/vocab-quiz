<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>단어 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --bg2: #ede8de;
  --surface: #ffffff;
  --surface2: #f9f6f0;
  --border: #ddd8ce;
  --border2: #c8c0b0;
  --text: #2c2416;
  --text2: #6b5f4a;
  --text3: #a89880;
  --accent: #c0392b;
  --accent2: #e74c3c;
  --accentbg: rgba(192,57,43,0.08);
  --green: #27ae60;
  --green-bg: rgba(39,174,96,0.1);
  --red: #c0392b;
  --red-bg: rgba(192,57,43,0.08);
  --yellow: #d4870a;
  --navy: #1a2744;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(44,36,22,0.08);
  --shadow2: 0 4px 24px rgba(44,36,22,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

#app { min-height: 100vh; display: flex; flex-direction: column; }
.screen { display: none; flex: 1; flex-direction: column; }
.screen.active { display: flex; }

/* ── LOGIN ── */
#login-screen {
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--bg);
  background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(44,36,22,0.04) 27px, rgba(44,36,22,0.04) 28px),
                    repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(44,36,22,0.04) 27px, rgba(44,36,22,0.04) 28px);
}

.login-card {
  width: 100%;
  max-width: 360px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 32px;
  box-shadow: var(--shadow2);
  text-align: center;
}

.login-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.login-title {
  font-family: 'Playfair Display', serif;
  font-size: 38px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.1;
  margin-bottom: 4px;
}

.login-title span { color: var(--accent); font-style: normal; }

.login-divider {
  width: 40px; height: 2px;
  background: var(--accent);
  margin: 16px auto;
}

.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; }

.text-input {
  width: 100%;
  padding: 12px 16px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  outline: none;
  transition: border-color 0.15s;
  text-align: center;
  letter-spacing: 3px;
  margin-bottom: 12px;
}
.text-input:focus { border-color: var(--accent); }
.text-input::placeholder { letter-spacing: 0; color: var(--text3); font-size: 14px; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 18px;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  width: 100%;
  padding: 13px;
  background: var(--navy);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  border-radius: var(--radius);
  letter-spacing: 1px;
}
.btn-primary:hover { background: #243560; }

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1.5px solid var(--border);
}
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }

.btn-danger {
  background: var(--red-bg);
  color: var(--red);
  border: 1px solid rgba(192,57,43,0.25);
}

.btn-success {
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid rgba(39,174,96,0.25);
}

.btn-accent {
  background: var(--accentbg);
  color: var(--accent);
  border: 1px solid rgba(192,57,43,0.2);
}

.login-hint { font-size: 12px; color: var(--text3); margin-top: 14px; }

.shake { animation: shake 0.4s; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 54px;
  background: var(--navy);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 10;
}

.topbar-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
}

.topbar-right { display: flex; align-items: center; gap: 8px; }

.user-badge {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 4px 10px;
}

.topbar .btn-ghost {
  color: rgba(255,255,255,0.7);
  border-color: rgba(255,255,255,0.2);
  font-size: 12px;
  padding: 5px 10px;
}
.topbar .btn-ghost:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

/* ── CONTENT ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 60px;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
}

/* ── SECTION HEADER ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  margin-top: 24px;
}
.section-header:first-child { margin-top: 0; }

.section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
}

.card-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.card-row:last-child { border-bottom: none; }
.card-row:hover { background: var(--surface2); }
.card-row.no-hover { cursor: default; }
.card-row.no-hover:hover { background: transparent; }

.card-main { font-size: 14px; font-weight: 600; color: var(--text); }
.card-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.card-right { display: flex; align-items: center; gap: 8px; }
.card-arrow { color: var(--text3); font-size: 14px; }

/* wordset card */
.ws-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow 0.15s, border-color 0.15s;
}
.ws-card:hover { box-shadow: var(--shadow2); border-color: var(--border2); }

.ws-card-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
}

.ws-card-icon {
  width: 40px; height: 40px;
  background: var(--navy);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  margin-right: 12px;
}

.ws-card-info { flex: 1; min-width: 0; }
.ws-card-name { font-size: 15px; font-weight: 700; color: var(--text); }
.ws-card-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

.ws-lec-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 0 16px 12px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}

/* ── RECORDS ── */
.record-score { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.score-detail { font-size: 12px; color: var(--text2); }
.score-detail .c { color: var(--green); font-weight: 700; }
.score-detail .w { color: var(--red); font-weight: 700; }
.score-pct { color: var(--navy); font-weight: 800; font-size: 16px; }

/* ── EMPTY ── */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 13px;
  line-height: 2;
}

/* ── QUIZ ── */
#quiz-screen { background: var(--bg); }

.quiz-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px 16px;
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
}

.progress-wrap { margin-bottom: 16px; }
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 6px;
  font-weight: 600;
}
.progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill {
  height: 100%;
  background: var(--navy);
  border-radius: 2px;
  transition: width 0.3s ease;
}

.timer-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.timer-track { flex: 1; height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
.timer-fill { height: 100%; border-radius: 4px; transition: width 0.95s linear, background-color 0.3s; }
.timer-num { font-size: 20px; font-weight: 900; min-width: 20px; text-align: right; color: var(--text); }

.question-box {
  background: var(--navy);
  border-radius: 16px;
  padding: 32px 24px;
  text-align: center;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.question-box::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.q-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }
.q-word {
  font-family: 'Playfair Display', serif;
  font-size: clamp(34px, 9vw, 56px);
  color: #fff;
  line-height: 1.1;
}

.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.choice-btn {
  padding: 14px 12px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color 0.1s, background 0.1s;
  outline: none;
  line-height: 1.4;
  box-shadow: var(--shadow);
}
.choice-btn:not(:disabled):hover { border-color: var(--navy); background: var(--surface2); }
.choice-btn:disabled { cursor: default; }
.choice-btn.correct { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.choice-btn.wrong { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.choice-btn.dimmed { opacity: 0.3; }
.choice-num { font-size: 16px; flex-shrink: 0; opacity: 0.5; }
.choice-btn.correct .choice-num, .choice-btn.wrong .choice-num { opacity: 1; }

.feedback {
  margin-top: 14px;
  padding: 11px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.2s;
}
.feedback.show { opacity: 1; }
.feedback.correct { background: var(--green-bg); color: var(--green); border: 1px solid rgba(39,174,96,0.3); }
.feedback.wrong { background: var(--red-bg); color: var(--red); border: 1px solid rgba(192,57,43,0.3); }

/* ── RESULT ── */
.result-hero {
  background: var(--navy);
  border-radius: 16px;
  padding: 32px 20px 24px;
  text-align: center;
  margin-bottom: 16px;
  color: #fff;
}

.score-circle {
  width: 100px; height: 100px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  position: relative;
}
.score-circle::before {
  content: '';
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  background: var(--navy);
}
.score-inner { position: relative; z-index: 1; text-align: center; }
.score-pct-big { font-family: 'Playfair Display', serif; font-size: 28px; color: #fff; line-height: 1; }
.score-pct-unit { font-size: 14px; color: rgba(255,255,255,0.6); }

.grade-text { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.grade-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 20px; }

.stat-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
.stat-box {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 10px 20px;
  text-align: center;
  min-width: 70px;
}
.stat-n { font-size: 22px; font-weight: 700; color: #fff; }
.stat-l { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 1px; }

.wrong-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.wrong-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.wrong-title { font-size: 13px; font-weight: 700; color: var(--text2); }
.copy-btn {
  font-size: 12px;
  padding: 5px 10px;
  background: var(--surface);
  color: var(--accent);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
}
.copy-btn:hover { border-color: var(--accent); }

.wrong-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.wrong-item:last-child { border-bottom: none; }
.wrong-word { font-weight: 700; color: var(--text); }
.wrong-meaning { color: var(--text2); }

.result-btns { display: flex; gap: 10px; }
.result-btns .btn { flex: 1; padding: 13px; font-size: 14px; font-weight: 700; }

/* ── ADMIN TABS ── */
.admin-tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}
.admin-tab {
  flex: 1;
  padding: 13px 8px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  color: var(--text2);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: color 0.15s;
  white-space: nowrap;
}
.admin-tab.active { color: var(--navy); border-bottom-color: var(--navy); }

/* ── FORM ── */
.form-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.form-input {
  flex: 1;
  min-width: 100px;
  padding: 9px 12px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--navy); }

.form-textarea {
  width: 100%;
  min-height: 200px;
  padding: 12px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.7;
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
}
.form-textarea:focus { border-color: var(--navy); }

.form-hint { font-size: 11px; color: var(--text3); margin-top: 6px; line-height: 1.6; }

.edit-box {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
.edit-box-title { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 12px; }

/* ── BADGE ── */
.badge {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}
.badge-blue { background: rgba(26,39,68,0.08); color: var(--navy); border: 1px solid rgba(26,39,68,0.15); }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-accent { background: var(--accentbg); color: var(--accent); }

/* ── SELECT SCREEN ── */
.select-option {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  margin-bottom: 6px;
  box-shadow: var(--shadow);
  transition: border-color 0.12s, background 0.12s;
}
.select-option:hover { border-color: var(--navy); background: var(--surface2); }
.select-option.selected { border-color: var(--navy); background: rgba(26,39,68,0.05); }

.count-option {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 12px 8px;
  text-align: center;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  transition: all 0.12s;
  box-shadow: var(--shadow);
}
.count-option:hover { border-color: var(--navy); color: var(--navy); }
.count-option.selected { border-color: var(--navy); background: var(--navy); color: #fff; }


/* ── Loading button ── */
.btn-loading {
  position: relative;
  pointer-events: none;
  opacity: 0.75;
}
.btn-loading::after {
  content: '';
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
.btn-loading-dark::after {
  border-color: rgba(0,0,0,0.15);
  border-top-color: var(--navy);
}
/* ── SPINNER ── */
.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--navy);
  color: #fff;
  padding: 10px 20px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: 0 8px 24px rgba(26,39,68,0.3);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── LEC PICKER MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,39,68,0.4);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.modal-sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 32px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 -8px 32px rgba(26,39,68,0.2);
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; text-align: center; }
.modal-lec-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
.modal-lec-btn {
  padding: 12px 8px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
  transition: all 0.1s;
}
.modal-lec-btn:hover { border-color: var(--navy); color: var(--navy); }

/* ── RESPONSIVE ── */
@media (max-width: 420px) {
  .choices { grid-template-columns: 1fr; }
  .login-card { padding: 28px 20px; }
  .stat-box { min-width: 60px; padding: 10px 10px; }
}
</style>
</head>
<body>
<div id="app">

  <!-- ① 로그인 -->
  <div id="login-screen" class="screen active">
    <div class="login-card">

  <div id="home-screen" class="screen" style="flex-direction:column;">
    <div class="topbar">
      <span class="topbar-title">단어 테스트</span>
      <div class="topbar-right">
        <span class="user-badge" id="home-user-badge"></span>

      </div>
      <div id="wrong-words-section" style="display:none">
        <div id="wrong-words-list"></div>
        <div id="wrong-words-actions" style="display:none;gap:8px;margin-top:8px">

      <div class="section-header">
        <span class="section-title">내 테스트 기록</span>

  <div id="quiz-screen" class="screen" style="flex-direction:column;">
    <div class="topbar">

      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="q-progress">1 / 10</span>
          <span id="q-correct-count" style="color:var(--green);font-weight:700;">✓ 0</span>
        </div>

          <div class="progress-fill" id="q-progress-fill" style="width:0%"></div>
        </div>
      </div>

        <div class="timer-track">
          <div class="timer-fill" id="timer-fill" style="width:100%;background:var(--green)"></div>
        </div>

      </div>
      <div class="question-box">
        <div class="q-label">다음 단어의 뜻은?</div>
        <div class="q-word" id="q-word">apple</div>

  <!-- ④ 결과 -->

      <button class="admin-tab active" onclick="adminTab('students',this)">👥 학생</button>
      <button class="admin-tab" onclick="adminTab('wordsets',this)">📚 단어장</button>
      <button class="admin-tab" onclick="adminTab('records',this)">📊 기록</button>
      <button class="admin-tab" onclick="adminTab('settings',this)">🔧 설정</button>
    </div>
    <div class="content">
      <div id="admin-students"></div>
      <div id="admin-wordsets" style="display:none"></div>

    </div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════
// 🔧 설정
// ════════════════════════════════════════════
const CONFIG = {
  ADMIN_CODE: "admin1234",
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbyGmCYGdyHecZmfAtPHvgOHIQ90NS2cAl9ekW5qdybC0oyKx_uRVQ_szhtXNlYFEyEuWA/exec",
};

// ════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════
let STATE = {
  user: null, wordsets: [], students: [], records: [], wrongWords: [],
  quiz: { words:[], current:0, correct:0, wrongList:[], correctIdx:-1, answered:false, setName:"", timer:null, autoTimer:null, allWords:[], wsId:"" }
};

function lget(k) { try { return JSON.parse(localStorage.getItem("vq3_"+k)); } catch { return null; } }
function lset(k,v) { try { localStorage.setItem("vq3_"+k, JSON.stringify(v)); } catch(e){} }

// ════════════════════════════════════════════
// Apps Script
// ════════════════════════════════════════════
function scriptConfigured() { return !!CONFIG.SCRIPT_URL; }

async function scriptGet(action, params={}) {
  if (!scriptConfigured()) return null;
  try {
    const qs = new URLSearchParams({action, ...params}).toString();
    const res = await fetch(`${CONFIG.SCRIPT_URL}?${qs}`);
    const data = await res.json();
    return data.ok ? data.data : null;
  } catch { return null; }
}

async function scriptPost(payload) {
  if (!scriptConfigured()) return false;
  try {
    const res = await fetch(CONFIG.SCRIPT_URL, { method:"POST", body:JSON.stringify(payload) });
    const data = await res.json();
    return data.ok;
  } catch { return false; }
}

// ════════════════════════════════════════════
// 데이터
// ════════════════════════════════════════════
function calcLectures(words) {
  return [...new Set(words.map(w=>w.lecture).filter(Boolean))]
    .sort((a,b) => { const na=Number(a), nb=Number(b); return (!isNaN(na)&&!isNaN(nb)) ? na-nb : a.localeCompare(b); });
}

async function loadStudents() {
  STATE.students = lget("students") || [];
  if (!scriptConfigured()) return;
  const data = await scriptGet("getStudents");
  if (data && data.length) { STATE.students = data; lset("students", STATE.students); }
}

async function loadWordsets() {
  STATE.wordsets = lget("wordsets") || [];
  renderWordsetList();
  if (!scriptConfigured()) return;
  const data = await scriptGet("getWordsets");
  if (data && data.length) {
    STATE.wordsets = data.map(ws => ({...ws, lectures: calcLectures(ws.words)}));
    lset("wordsets", STATE.wordsets);
  }
  renderWordsetList();
}

async function loadRecords() {
  STATE.records = lget("records") || [];
  if (!scriptConfigured()) return;
  const data = await scriptGet("getRecords");
  if (data && data.length) { STATE.records = data; lset("records", STATE.records); }
}

async function loadWrongWords() {
  if (!STATE.user) return;
  STATE.wrongWords = lget("wrongWords_"+STATE.user.code) || [];
  if (!scriptConfigured()) return;
  const data = await scriptGet("getWrongWords", {studentCode: STATE.user.code});
  if (data) {
    STATE.wrongWords = data;
    lset("wrongWords_"+STATE.user.code, STATE.wrongWords);
  }
  renderWrongWordsBadge();
}

async function mergeWrongWords(newWrongs) {
  // 새로 틀린 단어를 기존 오답 단어장에 병합 (중복 시 날짜 업데이트)
  const now = new Date().toLocaleString("ko-KR");
  newWrongs.forEach(w => {
    const idx = STATE.wrongWords.findIndex(x => x.word === w.word);
    if (idx >= 0) STATE.wrongWords[idx] = {...w, date: now};
    else STATE.wrongWords.push({...w, date: now});
  });
  lset("wrongWords_"+STATE.user.code, STATE.wrongWords);
  await scriptPost({action:"saveWrongWords", studentCode:STATE.user.code, words:STATE.wrongWords});
  renderWrongWordsBadge();
}

async function deleteWrongWord(word) {
  STATE.wrongWords = STATE.wrongWords.filter(w => w.word !== word);
  lset("wrongWords_"+STATE.user.code, STATE.wrongWords);
  await scriptPost({action:"deleteWrongWord", studentCode:STATE.user.code, word});
  renderWrongWordList();
  renderWrongWordsBadge();
  showToast("🗑️ 삭제됐어요");
}

function renderWrongWordsBadge() {
  const badge = document.getElementById("wrong-words-badge");
  if (badge) badge.textContent = STATE.wrongWords.length + "개";
}

async function saveRecord(rec) {
  STATE.records.unshift(rec);
  lset("records", STATE.records);
  await scriptPost({ action:"saveRecord", record:rec });
}

// ════════════════════════════════════════════
// 화면
// ════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

// ════════════════════════════════════════════
// 로그인
// ════════════════════════════════════════════
function doLogin() {
  const code = document.getElementById("login-input").value.trim();
  if (!code) return;
  if (code === CONFIG.ADMIN_CODE) {
    STATE.user = { code, name:"관리자", isAdmin:true };
    showScreen("admin-screen");
    renderAdmin();
    return;
  }
  const found = STATE.students.find(s=>s.code===code);
  if (found) {
    STATE.user = { code:found.code, name:found.name, isAdmin:false, allowedWs: found.allowedWs || null };
    document.getElementById("home-user-badge").textContent = found.name;
    showScreen("home-screen");
    loadWordsets();
    loadWrongWords();
    renderMyRecords();
  } else {
    const el = document.getElementById("login-input");
    el.classList.add("shake");
    setTimeout(()=>el.classList.remove("shake"), 500);
    el.value = "";
    showToast("❌ 등록되지 않은 코드예요");
  }
}

function doLogout() { STATE.user=null; document.getElementById("login-input").value=""; showScreen("login-screen"); }
function goHome() { showScreen("home-screen"); renderMyRecords(); loadWrongWords(); }

// ════════════════════════════════════════════
// 오답 단어장
// ════════════════════════════════════════════
function toggleWrongWordsSection() {
  const sec = document.getElementById("wrong-words-section");
  if (sec.style.display === "none") {
    sec.style.display = "block";
    renderWrongWordList();
  } else {
    sec.style.display = "none";
  }
}

function renderWrongWordList() {
  const el = document.getElementById("wrong-words-list");
  const acts = document.getElementById("wrong-words-actions");
  if (!STATE.wrongWords.length) {
    el.innerHTML = `<div class="empty" style="padding:16px 0;font-size:13px">아직 틀린 단어가 없어요 🎉</div>`;
    if (acts) acts.style.display = "none";
    return;
  }
  if (acts) acts.style.display = "flex";
  el.innerHTML = `<div class="card" style="margin-bottom:8px">${STATE.wrongWords.map(w=>`
    <div class="card-row no-hover">
      <div>
        <div class="card-main">${w.word}</div>
        <div class="card-sub">${w.meaning}${w.date ? " · "+w.date : ""}</div>
      </div>
      <button class="btn btn-danger" style="padding:4px 10px;font-size:12px" onclick="deleteWrongWord('${w.word}')">삭제</button>
    </div>`).join("")}</div>`;
}

function startWrongWordsQuiz() {
  if (STATE.wrongWords.length < 4) { showToast("오답 단어가 너무 적어요 (최소 4개)"); return; }
  const allWords = STATE.wordsets.flatMap(ws=>ws.words);
  const fakeWs = { id:"wrong", name:"오답 단어장", words: allWords.length ? allWords : STATE.wrongWords };
  _doStartQuiz(STATE.wrongWords, "오답 단어 테스트", fakeWs, STATE.wrongWords.length);
}

// ════════════════════════════════════════════
// 홈
// ════════════════════════════════════════════
function renderWordsetList() {
  const el = document.getElementById("wordset-list");
  if (!STATE.wordsets.length) {
    el.innerHTML = `<div class="empty">등록된 단어장이 없어요<br>관리자에게 문의하세요</div>`;
    return;
  }
  // 학생별 허용 단어장 필터링
  const allowed = STATE.user?.allowedWs || null;
  const visible = allowed ? STATE.wordsets.filter(ws => allowed.includes(ws.id)) : STATE.wordsets;
  if (!visible.length) {
    el.innerHTML = `<div class="empty">접근 가능한 단어장이 없어요<br>관리자에게 문의하세요</div>`;
    return;
  }
  el.innerHTML = visible.map(ws => {
    const hasLec = ws.lectures && ws.lectures.length > 0;
    const lecBadges = hasLec ? ws.lectures.map(lec => {
      const cnt = ws.words.filter(w=>w.lecture===lec).length;
      return `<span class="badge badge-blue">${lec}강 ${cnt}개</span>`;
    }).join("") : "";
    return `
    <div class="ws-card" onclick="openSelectScreen('${ws.id}')">
      <div class="ws-card-inner">
        <div class="ws-card-icon">📖</div>
        <div class="ws-card-info">
          <div class="ws-card-name">${ws.name}</div>
          <div class="ws-card-meta">${ws.words.length}개 단어${hasLec ? " · "+ws.lectures.length+"강" : ""}</div>
        </div>
        <span class="card-arrow" style="color:var(--text3);font-size:18px">›</span>
      </div>
      ${hasLec ? `<div class="ws-lec-bar">${lecBadges}</div>` : ""}
    </div>`;
  }).join("");
}

function renderMyRecords() {
  const el = document.getElementById("my-records-list");
  const mine = STATE.records.filter(r=>r.studentCode===STATE.user?.code).slice(0,10);
  if (!mine.length) { el.innerHTML = `<div class="empty" style="padding:20px 0">아직 기록이 없어요</div>`; return; }
  el.innerHTML = `<div class="card">${mine.map(r=>{
    const pct = Math.round(r.correct/r.total*100);
    return `<div class="card-row no-hover">
      <div><div class="card-main">${r.setName}</div><div class="card-sub">${r.date}</div></div>
      <div class="record-score">
        <span class="score-pct">${pct}%</span>
        <span class="score-detail">정답 <span class="c">${r.correct}개</span> · 오답 <span class="w">${r.wrong}개</span></span>
      </div>
    </div>`;
  }).join("")}</div>`;
}

// ════════════════════════════════════════════
// 강/문제수 선택
// ════════════════════════════════════════════
function openSelectScreen(wsId) {
  const ws = STATE.wordsets.find(w=>w.id===wsId);
  if (!ws) return;
  document.getElementById("select-topbar-title").textContent = ws.name;
  const hasLec = ws.lectures && ws.lectures.length > 0;
  const el = document.getElementById("select-content");

  el.innerHTML = `
    <div class="section-header" style="margin-top:0"><span class="section-title">강 선택</span></div>
    <div class="edit-box" style="margin-bottom:20px">
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 14px;background:var(--surface);border:1.5px solid var(--navy);border-radius:8px;font-size:13px;font-weight:700;color:var(--navy)">
          <input type="checkbox" id="lec-all" style="accent-color:var(--navy)" onchange="toggleAllLec(this)" checked> 📚 전체
        </label>
        ${hasLec ? ws.lectures.map(lec=>{
          const cnt = ws.words.filter(w=>w.lecture===lec).length;
          return `<label style="display:flex;align-items:center;gap:5px;cursor:pointer;padding:8px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:600" class="lec-label">
            <input type="checkbox" class="lec-cb" value="${lec}" style="accent-color:var(--navy)" onchange="onLecChange()" checked>
            ${lec}강 <span style="color:var(--text3);font-size:11px;font-weight:400">${cnt}개</span>
          </label>`;
        }).join("") : `<span style="font-size:13px;color:var(--text3);padding:8px">강 구분이 없는 단어장이에요</span>`}
      </div>
      <p class="form-hint">여러 강을 동시에 선택할 수 있어요</p>
    </div>

    <div class="section-header"><span class="section-title">문제 수</span></div>
    <div style="display:flex;gap:8px;margin-bottom:24px">
      <div class="count-option selected" id="cnt-30" onclick="selectCount('30')">30개</div>
      <div class="count-option" id="cnt-50" onclick="selectCount('50')">50개</div>
      <div class="count-option" id="cnt-100" onclick="selectCount('100')">100개</div>
      <div class="count-option" id="cnt-all" onclick="selectCount('all')">전체</div>
    </div>

    <button class="btn btn-primary" style="padding:15px;font-size:16px;font-weight:700;letter-spacing:1px" onclick="confirmStart('${ws.id}')">
      테스트 시작하기 →
    </button>
  `;

  window._selectedCount = "30";
  showScreen("select-screen");
}

function toggleAllLec(cb) { document.querySelectorAll(".lec-cb").forEach(c=>c.checked=cb.checked); }

function onLecChange() {
  const all = document.querySelectorAll(".lec-cb");
  const checked = [...all].filter(c=>c.checked);
  const allCb = document.getElementById("lec-all");
  if (allCb) allCb.checked = checked.length === all.length;
}

function selectCount(v) {
  window._selectedCount = v;
  ["30","50","100","all"].forEach(k => {
    const el = document.getElementById("cnt-"+k);
    if (el) el.className = "count-option" + (k===v?" selected":"");
  });
}

function confirmStart(wsId) {
  const ws = STATE.wordsets.find(w=>w.id===wsId);
  if (!ws) return;
  const hasLec = ws.lectures && ws.lectures.length > 0;
  const lecCbs = [...document.querySelectorAll(".lec-cb:checked")].map(c=>c.value);

  let words = ws.words;
  let label = ws.name;

  if (hasLec && lecCbs.length > 0 && lecCbs.length < ws.lectures.length) {
    words = ws.words.filter(w=>lecCbs.includes(w.lecture));
    label = lecCbs.length===1 ? `${ws.name} ${lecCbs[0]}강` : `${ws.name} ${lecCbs[0]}~${lecCbs[lecCbs.length-1]}강`;
  } else if (hasLec) {
    label = ws.name + " 전체";
  }

  if (words.length < 4) { showToast("선택한 범위의 단어가 너무 적어요 (최소 4개)"); return; }

  const cnt = window._selectedCount;
  let limit = cnt==="all" ? words.length : parseInt(cnt);
  if (limit > words.length) limit = words.length;

  _doStartQuiz(words, label, ws, limit);
}

// ════════════════════════════════════════════
// 퀴즈
// ════════════════════════════════════════════
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function _doStartQuiz(words, label, ws, limit) {
  const q = STATE.quiz;
  const max = limit || Math.min(words.length, 30);
  q.words = shuffle(words).slice(0, max);
  q.allWords = ws.words;
  q.wsId = ws.id;
  q.current = 0; q.correct = 0; q.wrongList = []; q.setName = label;
  document.getElementById("quiz-topbar-title").textContent = label;
  showScreen("quiz-screen");
  renderQuestion();
}

function renderQuestion() {
  const q = STATE.quiz;
  const word = q.words[q.current];
  const total = q.words.length;

  document.getElementById("q-progress").textContent = `${q.current+1} / ${total}`;
  document.getElementById("q-correct-count").textContent = `✓ ${q.correct}`;
  document.getElementById("q-progress-fill").style.width = `${(q.current/total)*100}%`;
  document.getElementById("q-word").textContent = word.word;
  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").textContent = "";

  const pool = (q.allWords || STATE.wordsets.flatMap(ws=>ws.words)).filter(w=>w.meaning!==word.meaning);
  const distractors = shuffle(pool).slice(0,3);
  q.choices = shuffle([word, ...distractors]);
  q.correctIdx = q.choices.findIndex(c=>c.meaning===word.meaning);
  q.answered = false;

  const nums = ["①","②","③","④"];
  document.getElementById("choices").innerHTML = q.choices.map((c,i)=>
    `<button class="choice-btn" onclick="pickAnswer(${i})">
      <span class="choice-num">${nums[i]}</span><span>${c.meaning}</span>
    </button>`
  ).join("");

  clearTimeout(q.timer); clearTimeout(q.autoTimer);
  let t = 5;
  const fill = document.getElementById("timer-fill");
  const num = document.getElementById("timer-num");
  fill.style.transition = "none";
  fill.style.width = "100%";
  fill.style.backgroundColor = "var(--green)";
  num.textContent = t;
  setTimeout(() => { fill.style.transition = "width 0.95s linear, background-color 0.3s"; tick(); }, 50);

  function tick() {
    if (q.answered) return;
    t--;
    num.textContent = t;
    fill.style.width = `${(t/5)*100}%`;
    fill.style.backgroundColor = t<=1?"var(--red)":t<=2?"var(--yellow)":"var(--green)";
    if (t<=0) { pickAnswer(null); return; }
    q.timer = setTimeout(tick, 1000);
  }
}

function pickAnswer(idx) {
  const q = STATE.quiz;
  if (q.answered) return;
  q.answered = true;
  clearTimeout(q.timer);
  const word = q.words[q.current];
  const isCorrect = idx!==null && idx===q.correctIdx;
  if (isCorrect) q.correct++;
  else q.wrongList.push(word);

  document.querySelectorAll(".choice-btn").forEach((btn,i) => {
    btn.disabled = true;
    if (i===q.correctIdx) btn.classList.add("correct");
    else if (i===idx && !isCorrect) btn.classList.add("wrong");
    else btn.classList.add("dimmed");
  });

  const fb = document.getElementById("feedback");
  if (idx===null) { fb.textContent="⏰ 시간 초과!"; fb.className="feedback wrong show"; }
  else if (isCorrect) { fb.textContent="✅ 정답!"; fb.className="feedback correct show"; }
  else { fb.textContent=`❌ 오답  |  정답: ${word.meaning}`; fb.className="feedback wrong show"; }

  q.autoTimer = setTimeout(() => {
    q.current++;
    if (q.current>=q.words.length) finishQuiz();
    else renderQuestion();
  }, 1000);
}

function exitQuiz() { clearTimeout(STATE.quiz.timer); clearTimeout(STATE.quiz.autoTimer); goHome(); }

async function finishQuiz() {
  const q = STATE.quiz;
  const total = q.words.length;
  const rec = {
    id: Date.now().toString(),
    studentCode: STATE.user.code, studentName: STATE.user.name,
    setName: q.setName, total, correct: q.correct, wrong: total-q.correct,
    wrongWords: q.wrongList, date: new Date().toLocaleString("ko-KR"),
  };
  await saveRecord(rec);
  // 틀린 단어 오답 단어장에 저장
  if (q.wrongList.length > 0) await mergeWrongWords(q.wrongList);
  renderResult(rec);
  showScreen("result-screen");
}

function renderResult(rec) {

  const deg = Math.round(pct/100*360);
  const el = document.getElementById("result-content");
  el.innerHTML = `
    <div class="result-hero">
      <div class="score-circle" style="background:conic-gradient(rgba(255,255,255,0.8) ${deg}deg, rgba(255,255,255,0.15) 0deg)">
        <div class="score-inner">
          <div class="score-pct-big">${pct}<span class="score-pct-unit">%</span></div>
        </div>
      </div>
      <div class="grade-text">${grade}</div>
      <div class="grade-sub">${rec.setName} · ${rec.date}</div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-n">${rec.total}</div><div class="stat-l">총 문제</div></div>
        <div class="stat-box"><div class="stat-n" style="color:#6ee7a0">${rec.correct}</div><div class="stat-l">정답</div></div>
        <div class="stat-box"><div class="stat-n" style="color:#f9a8a4">${rec.wrong}</div><div class="stat-l">오답</div></div>
      </div>
    </div>
    ${rec.wrongWords.length ? `
    <div class="wrong-section">
      <div class="wrong-header">
        <span class="wrong-title">틀린 단어 (${rec.wrongWords.length}개)</span>
        <button class="copy-btn" onclick="copyWrong(${JSON.stringify(rec).replace(/"/g,'&quot;')})">📋 복사</button>
      </div>
      ${rec.wrongWords.map(w=>`
        <div class="wrong-item">
          <span class="wrong-word">${w.word}</span>
          <span class="wrong-meaning">${w.meaning}</span>
        </div>`).join("")}
    </div>` : ""}
    <div class="result-btns" style="flex-wrap:wrap">
      <button class="btn btn-primary" onclick="openSelectScreen('${STATE.quiz.wsId||''}')">🔄 다시 풀기</button>
      ${rec.wrongWords.length >= 4 ? `<button class="btn btn-accent" style="flex:1;min-width:140px" onclick="startWrongOnlyQuiz()">❌ 틀린 단어만</button>` : ""}

    </div>
  `;
}

function startWrongOnlyQuiz() {
  const words = STATE.quiz.wrongList;
  if (!words || words.length < 4) { showToast("틀린 단어가 너무 적어요 (최소 4개)"); return; }
  const fakeWs = { id: STATE.quiz.wsId, name: STATE.quiz.setName, words: STATE.wordsets.flatMap(ws=>ws.words) };
  _doStartQuiz(words, "오답 재시험", fakeWs, words.length);
}

function copyWrong(rec) {
  const pct = Math.round(rec.correct/rec.total*100);
  const text = [`[단어 테스트 결과] ${rec.setName} — ${rec.date}`,`총 ${rec.total}문제 | 정답 ${rec.correct}개 | 오답 ${rec.wrong}개 | ${pct}%`,"","틀린 단어:",...rec.wrongWords.map(w=>`  • ${w.word} = ${w.meaning}`)].join("\n");
  clipCopy(text, "📋 클립보드에 복사했어요!");
}

function clipCopy(text, msg) {
  if (navigator.clipboard?.writeText) { navigator.clipboard.writeText(text).then(()=>showToast(msg)).catch(()=>fallbackCopy(text,msg)); }
  else { fallbackCopy(text,msg); }
}
function fallbackCopy(text, msg) {
  const ta = document.createElement("textarea"); ta.value=text; ta.style.cssText="position:fixed;top:-9999px;left:-9999px;opacity:0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand("copy"); showToast(msg); } catch { showToast("복사 실패 — 직접 선택해주세요"); }
  document.body.removeChild(ta);
}

function showWsEditor(wsId, lec) {

  editingLec = lec;
  const ws = wsId ? STATE.wordsets.find(w=>w.id===wsId) : null;
  const existingNames = [...new Set(STATE.wordsets.map(w=>w.name))];
  const nameDatalist = existingNames.map(n=>`<option value="${n}">`).join("");

  let titleText, wordsValue, nameValue, lecValue, hintText, extraBtns = "";

  if (ws && lec) {
    // 특정 강 편집

    hintText = `💡 ${lec}강의 단어만 수정됩니다. 다른 강은 유지돼요.`;
    extraBtns = `<button class="btn btn-danger" onclick="deleteLec('${wsId}','${lec}')">🗑️ 이 강 삭제</button>`;

    const hasLec = ws.lectures && ws.lectures.length > 0;
    const lecButtons = hasLec ? ws.lectures.map(l=>{
      const cnt = ws.words.filter(w=>w.lecture===l).length;
      return `<button class="btn btn-ghost" style="padding:8px 14px;font-size:13px;font-weight:600" onclick="showWsEditor('${wsId}','${l}')">${l}강 (${cnt}개)</button>`;

      </div>`;

    lecValue = "";

  }

  if (lec === "__new__") {
    titleText = `${ws?.name || ""} — 새 단어장 추가`;
    wordsValue = "";

      </div>
      <textarea class="form-textarea" id="ws-words-input" placeholder="단어 = 뜻 (한 줄에 하나씩)&#10;&#10;apple = 사과&#10;banana = 바나나">${wordsValue}</textarea>
      <p class="form-hint">${hintText}</p>

        <button class="btn btn-success" onclick="saveWs()">💾 저장</button>
        ${extraBtns}

function parseWordsText(raw, lecture) {
  return raw.split("\n").map(l=>l.trim()).filter(Boolean).map(l=>{
    const sep = l.includes("=")?"=":","
    const p = l.split(sep); if(p.length<2) return null;
    return {word:p[0].trim(), meaning:p.slice(1).join(sep).trim(), lecture:lecture||""};
  }).filter(w=>w&&w.word&&w.meaning);
}

async function saveWs() {
  const name = document.getElementById("ws-name-input").value.trim();
  const lecRaw = document.getElementById("ws-lec-input").value.trim();
  const lecture = lecRaw;
  const newWords = parseWordsText(document.getElementById("ws-words-input").value, lecture);

  if (!name) { showToast("단어장 이름을 입력하세요"); return; }
  if (newWords.length < 1) { showToast("단어를 입력하세요"); return; }

  const saveBtn = document.querySelector("#ws-editor-wrap .btn-success");
  if (saveBtn) btnLoad(saveBtn, "저장 중...");
  const existingIdx = STATE.wordsets.findIndex(w=>w.name===name);

  if (editingWsId && existingIdx>=0 && STATE.wordsets[existingIdx].id===editingWsId) {
    const ws = STATE.wordsets[existingIdx];
    const otherWords = editingLec ? ws.words.filter(w=>w.lecture!==editingLec) : (lecture ? ws.words.filter(w=>w.lecture!==lecture) : []);
    const merged = [...otherWords, ...newWords];
    STATE.wordsets[existingIdx] = {...ws, name, words:merged, lectures:calcLectures(merged)};
  } else if (!editingWsId && existingIdx>=0) {
    const ws = STATE.wordsets[existingIdx];
    const otherWords = lecture ? ws.words.filter(w=>w.lecture!==lecture) : ws.words;
    const merged = [...otherWords, ...newWords];
    STATE.wordsets[existingIdx] = {...ws, words:merged, lectures:calcLectures(merged)};
  } else {
    const id = "ws_"+name.replace(/\s+/g,"_")+"_"+Date.now();
    STATE.wordsets.push({id, name, words:newWords, lectures:calcLectures(newWords)});
  }

  lset("wordsets", STATE.wordsets);
  const wsToSave = STATE.wordsets.find(w=>w.name===name);
  await scriptPost({action:"saveWordset", name, words:wsToSave.words});

  document.getElementById("ws-editor-wrap").innerHTML = "";
  renderAdminWordsets();
  showToast("✅ 단어장 저장됐어요!");
}

async function deleteLec(wsId, lec) {
  if (!confirm(`${lec}강을 삭제할까요?`)) return;
  const btn = document.querySelector("#ws-editor-wrap .btn-danger");
  if (btn) btnLoad(btn, "삭제 중...");
  const ws = STATE.wordsets.find(w=>w.id===wsId);
  const remaining = ws.words.filter(w=>w.lecture!==lec);
  STATE.wordsets = STATE.wordsets.map(w=>w.id===wsId?{...w,words:remaining,lectures:calcLectures(remaining)}:w);
  lset("wordsets", STATE.wordsets);
  await scriptPost({action:"saveWordset", name:ws.name, words:remaining});
  document.getElementById("ws-editor-wrap").innerHTML = "";
  renderAdminWordsets();
  showToast("🗑️ 삭제됐어요");
}

async function deleteWs(id) {
  if (!confirm("단어장을 삭제할까요?")) return;
  // 해당 카드의 삭제 버튼 찾아 로딩
  const ws = STATE.wordsets.find(w=>w.id===id);
  STATE.wordsets = STATE.wordsets.filter(w=>w.id!==id);
  lset("wordsets", STATE.wordsets);
  showToast("⏳ 삭제 중...");
  if (ws) await scriptPost({action:"deleteWordset", name:ws.name});
  renderAdminWordsets();
  showToast("🗑️ 삭제됐어요");
}

// ── 기록 ──
function renderAdminRecords() {
  const el = document.getElementById("admin-records");
  const recs = STATE.records;
  el.innerHTML = `
    <div class="section-header" style="margin-top:0">
      <span class="section-title">전체 기록 (${recs.length}건)</span>
      <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px" onclick="copyAllRecords()">📋 전체 복사</button>
    </div>
    ${recs.length?`<div class="card">${recs.slice(0,50).map(r=>{
      const pct=Math.round(r.correct/r.total*100);
      return `<div class="card-row no-hover">
        <div style="flex:1;min-width:0">
          <div class="card-main">${r.studentName} <span style="color:var(--text2);font-size:12px;font-weight:400">${r.studentCode}</span></div>
          <div class="card-sub">${r.setName} · ${r.date}</div>
          ${r.wrongWords?.length?`<div style="font-size:11px;color:var(--red);margin-top:2px">틀린: ${r.wrongWords.map(w=>w.word).join(", ")}</div>`:""}
        </div>
        <div class="record-score" style="flex-shrink:0;margin-left:8px">
          <span class="score-pct">${pct}%</span>
          <span class="score-detail">정답 <span class="c">${r.correct}개</span> · 오답 <span class="w">${r.wrong}개</span></span>
        </div>
      </div>`;
    }).join("")}</div>`:`<div class="empty">기록이 없어요</div>`}
  `;
}

function copyAllRecords() {
  const lines = STATE.records.map(r=>`${r.date} | ${r.studentName}(${r.studentCode}) | ${r.setName} | ${r.correct}/${r.total} (${Math.round(r.correct/r.total*100)}%) | 틀린: ${r.wrongWords?.map(w=>w.word).join(", ")||"없음"}`).join("\n");
  clipCopy(lines, "📋 전체 기록 복사 완료!");
}

// ── 설정 ──
function renderAdminSettings() {
  const el = document.getElementById("admin-settings");
  el.innerHTML = `
    <div class="section-header" style="margin-top:0">
      <span class="section-title">연동 상태</span>
      ${scriptConfigured()?`<span class="badge badge-green">Apps Script 연동됨</span>`:`<span class="badge badge-red">미설정</span>`}
    </div>
    <div class="card">
      <div class="card-row no-hover">
        <div><div class="card-main">Apps Script URL</div>
        <div class="card-sub" style="word-break:break-all;font-size:11px">${CONFIG.SCRIPT_URL?CONFIG.SCRIPT_URL.slice(0,50)+"...":"미설정"}</div></div>
      </div>
      <div class="card-row no-hover">
        <div><div class="card-main">관리자 코드</div><div class="card-sub">${CONFIG.ADMIN_CODE}</div></div>
      </div>
    </div>
    <div class="section-header"><span class="section-title">데이터 관리</span></div>
    <div class="card">
      <div class="card-row" onclick="if(confirm('기록을 모두 삭제할까요?')){STATE.records=[];lset('records',[]);renderAdminRecords();showToast('삭제됐어요');}">
        <div class="card-main" style="color:var(--red)">🗑️ 전체 기록 초기화</div>
        <span class="card-arrow">›</span>
      </div>
    </div>
  `;
}


// ════════════════════════════════════════════
// 버튼 로딩 헬퍼
// ════════════════════════════════════════════
function btnLoad(btn, text="저장 중...") {
  btn.dataset.origText = btn.innerHTML;
  btn.innerHTML = text;
  btn.classList.add("btn-loading");
  if (!btn.classList.contains("btn-primary")) btn.classList.add("btn-loading-dark");
}
function btnDone(btn) {
  btn.innerHTML = btn.dataset.origText || btn.innerHTML;
  btn.classList.remove("btn-loading", "btn-loading-dark");
}
// ════════════════════════════════════════════
// 토스트
// ════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 2800);
}

// ════════════════════════════════════════════
// 초기화
// ════════════════════════════════════════════
async function init() {
  await loadStudents();
  document.getElementById("login-input").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
}
init();
</script>
