<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>단어 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ── 설정: 여기에 API 키와 스프레드시트 ID를 입력하세요 ── */
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --border2: #484f58;
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #484f58;
  --accent: #58a6ff;
  --accent2: #1f6feb;
  --green: #3fb950;
  --green-bg: rgba(63,185,80,0.1);
  --red: #f85149;
  --red-bg: rgba(248,81,73,0.1);
  --yellow: #d29922;
  --purple: #bc8cff;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Layout ── */
#app { min-height: 100vh; display: flex; flex-direction: column; }

.screen { display: none; flex: 1; flex-direction: column; }
.screen.active { display: flex; }

/* ── Login ── */
#login-screen {
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: radial-gradient(ellipse at 50% 0%, rgba(88,166,255,0.08) 0%, transparent 70%);
}

.login-card {
  width: 100%;
  max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 32px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}

.login-logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo-icon {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--accent2), var(--purple));
  border-radius: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 16px;
}

.login-title {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  color: var(--text);
  margin-bottom: 6px;
}

.login-sub {
  font-size: 13px;
  color: var(--text2);
}

.input-group {
  margin-bottom: 12px;
}

.input-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 6px;
  display: block;
  letter-spacing: 0.5px;
}

.text-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  outline: none;
  transition: border-color 0.15s;
  letter-spacing: 2px;
}
.text-input:focus { border-color: var(--accent); }
.text-input::placeholder { letter-spacing: 0; color: var(--text3); }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 18px;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #0d1117;
  font-size: 15px;
  font-weight: 700;
  margin-top: 8px;
}
.btn-primary:hover { background: #79c0ff; }

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }

.btn-danger {
  background: var(--red-bg);
  color: var(--red);
  border: 1px solid rgba(248,81,73,0.2);
}

.btn-success {
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid rgba(63,185,80,0.2);
}

.login-hint {
  text-align: center;
  font-size: 12px;
  color: var(--text3);
  margin-top: 16px;
}

.shake { animation: shake 0.4s; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

/* ── Top Bar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 10;
}

.topbar-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.topbar-right { display: flex; align-items: center; gap: 8px; }

.user-badge {
  font-size: 12px;
  color: var(--text2);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
}

/* ── Content ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 60px;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
}

/* ── Section Header ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  margin-top: 24px;
}
.section-header:first-child { margin-top: 0; }

.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 8px;
}

.card-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.card-row:last-child { border-bottom: none; }
.card-row:hover { background: var(--surface2); }
.card-row.no-hover { cursor: default; }
.card-row.no-hover:hover { background: transparent; }

.card-main { font-size: 14px; font-weight: 500; color: var(--text); }
.card-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.card-right { display: flex; align-items: center; gap: 8px; }
.card-arrow { color: var(--text3); font-size: 12px; }

/* ── Record items ── */
.record-score {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
}
.score-correct { color: var(--green); font-weight: 600; }
.score-wrong { color: var(--red); font-weight: 600; }
.score-pct { color: var(--text); font-weight: 700; font-size: 14px; }

/* ── Empty state ── */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 14px;
  line-height: 2;
}

/* ── Quiz Screen ── */
#quiz-screen { background: var(--bg); }

.quiz-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px 16px;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
}

/* Progress */
.progress-wrap { margin-bottom: 20px; }
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 6px;
}
.progress-track {
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* Timer */
.timer-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.timer-track {
  flex: 1;
  height: 6px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
}
.timer-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.95s linear, background-color 0.3s;
}
.timer-num {
  font-size: 20px;
  font-weight: 700;
  min-width: 20px;
  text-align: right;
}

/* Question */
.question-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px 24px;
  text-align: center;
  margin-bottom: 20px;
}
.q-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.q-word {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 8vw, 52px);
  color: var(--text);
  line-height: 1.1;
}

/* Choices */
.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.choice-btn {
  padding: 14px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  font-weight: 400;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color 0.1s, background 0.1s;
  outline: none;
  line-height: 1.4;
}
.choice-btn:not(:disabled):hover {
  border-color: var(--accent);
  background: var(--surface2);
}
.choice-btn:disabled { cursor: default; }

.choice-btn.correct {
  background: var(--green-bg);
  border-color: var(--green);
  color: var(--green);
}
.choice-btn.wrong {
  background: var(--red-bg);
  border-color: var(--red);
  color: var(--red);
}
.choice-btn.dimmed { opacity: 0.3; }

.choice-num {
  font-size: 16px;
  flex-shrink: 0;
  opacity: 0.6;
}
.choice-btn.correct .choice-num,
.choice-btn.wrong .choice-num { opacity: 1; }

/* Feedback */
.feedback {
  margin-top: 16px;
  padding: 11px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.2s;
}
.feedback.show { opacity: 1; }
.feedback.correct { background: var(--green-bg); color: var(--green); border: 1px solid rgba(63,185,80,0.25); }
.feedback.wrong { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,81,73,0.25); }

/* ── Result Screen ── */
.result-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 32px 20px 24px;
  text-align: center;
  margin-bottom: 16px;
}

.score-circle {
  width: 100px; height: 100px;
  border-radius: 50%;
  background: conic-gradient(var(--accent) 0%, transparent 0%);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  position: relative;
}
.score-circle::before {
  content: '';
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  background: var(--surface);
}
.score-inner {
  position: relative;
  z-index: 1;
  text-align: center;
}
.score-pct-big {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: var(--text);
  line-height: 1;
}
.score-pct-unit { font-size: 14px; color: var(--text2); }

.grade-text {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.grade-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

.stat-row { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
.stat-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 20px;
  text-align: center;
  min-width: 70px;
}
.stat-n { font-size: 22px; font-weight: 700; color: var(--text); }
.stat-l { font-size: 11px; color: var(--text2); margin-top: 1px; }

.wrong-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
}
.wrong-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.wrong-title { font-size: 13px; font-weight: 600; color: var(--text2); }
.copy-btn {
  font-size: 12px;
  padding: 5px 10px;
  background: var(--surface2);
  color: var(--accent);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.1s;
}
.copy-btn:hover { border-color: var(--accent); }

.wrong-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.wrong-item:last-child { border-bottom: none; }
.wrong-word { font-weight: 600; color: var(--text); }
.wrong-meaning { color: var(--text2); }

.result-btns { display: flex; gap: 10px; }
.result-btns .btn { flex: 1; padding: 12px; font-size: 14px; font-weight: 600; }

/* ── Admin Tabs ── */
.admin-tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}
.admin-tab {
  flex: 1;
  padding: 13px 8px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text2);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: color 0.15s;
  white-space: nowrap;
}
.admin-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Form elements ── */
.form-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.form-input {
  flex: 1;
  min-width: 100px;
  padding: 9px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--accent); }

.form-textarea {
  width: 100%;
  min-height: 180px;
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.7;
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
}
.form-textarea:focus { border-color: var(--accent); }

.form-hint { font-size: 11px; color: var(--text3); margin-top: 6px; line-height: 1.6; }

.edit-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
.edit-box-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 12px;
}

/* ── Tag / Badge ── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge-blue { background: rgba(88,166,255,0.12); color: var(--accent); }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }

/* ── Sheets config banner ── */
.config-banner {
  background: rgba(210,153,34,0.1);
  border: 1px solid rgba(210,153,34,0.3);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--yellow);
  line-height: 1.6;
}
.config-banner strong { display: block; margin-bottom: 4px; font-size: 14px; }

/* ── Loading overlay ── */
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
  padding: 10px 18px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── Responsive ── */
@media (max-width: 420px) {
  .choices { grid-template-columns: 1fr; }
  .login-card { padding: 28px 20px; }
  .stat-box { min-width: 60px; padding: 10px 12px; }
}
</style>
</head>
<body>
<div id="app">

  <!-- ① 로그인 -->
  <div id="login-screen" class="screen active">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">📖</div>
        <h1 class="login-title">단어 테스트</h1>
        <p class="login-sub">학생 코드를 입력하고 시작하세요</p>
      </div>
      <div class="input-group">
        <label class="input-label">학생 코드</label>
        <input class="text-input" id="login-input" type="text" placeholder="코드 입력..." autocomplete="off" spellcheck="false">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">입장하기</button>
      <p class="login-hint">관리자는 관리자 코드로 입력하세요</p>
    </div>
  </div>

  <!-- ② 단어장 선택 + 내 기록 -->
  <div id="home-screen" class="screen" style="flex-direction:column;">
    <div class="topbar">
      <span class="topbar-title">단어 테스트</span>
      <div class="topbar-right">
        <span class="user-badge" id="home-user-badge"></span>
        <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;" onclick="doLogout()">나가기</button>
      </div>
    </div>
    <div class="content">
      <div class="section-header" style="margin-top:0">
        <span class="section-title">단어장 선택</span>
        <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;" onclick="loadWordsets()">↺ 새로고침</button>
      </div>
      <div id="wordset-list"><div class="spinner"></div></div>

      <div class="section-header">
        <span class="section-title">내 테스트 기록</span>
      </div>
      <div id="my-records-list"></div>
    </div>
  </div>


  <!-- ②-b 강 선택 화면 -->
  <div id="select-screen" class="screen" style="flex-direction:column;">
    <div class="topbar">
      <span class="topbar-title" id="select-topbar-title">단어장 선택</span>
      <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;" onclick="goHome()">← 뒤로</button>
    </div>
    <div class="content" id="select-content"></div>
  </div>

  <!-- ③ 퀴즈 -->
  <div id="quiz-screen" class="screen" style="flex-direction:column;">
    <div class="topbar">
      <span class="topbar-title" id="quiz-topbar-title">퀴즈</span>
      <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;" onclick="exitQuiz()">그만하기</button>
    </div>
    <div class="quiz-content">
      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="q-progress">1 / 10</span>
          <span id="q-correct-count" style="color:var(--green);font-weight:600;">✓ 0</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="q-progress-fill" style="width:0%"></div>
        </div>
      </div>
      <div class="timer-row">
        <div class="timer-track">
          <div class="timer-fill" id="timer-fill" style="width:100%;background:var(--green)"></div>
        </div>
        <span class="timer-num" id="timer-num">5</span>
      </div>
      <div class="question-box">
        <div class="q-label" id="q-label">다음 단어의 뜻은?</div>
        <div class="q-word" id="q-word">apple</div>
      </div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>

  <!-- ④ 결과 -->
  <div id="result-screen" class="screen" style="flex-direction:column;">
    <div class="topbar">
      <span class="topbar-title">테스트 결과</span>
      <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;" onclick="goHome()">홈으로</button>
    </div>
    <div class="content" id="result-content"></div>
  </div>

  <!-- ⑤ 관리자 -->
  <div id="admin-screen" class="screen" style="flex-direction:column;">
    <div class="topbar">
      <span class="topbar-title">⚙ 관리자</span>
      <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;" onclick="doLogout()">로그아웃</button>
    </div>
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="adminTab('students',this)">👥 학생 관리</button>
      <button class="admin-tab" onclick="adminTab('wordsets',this)">📚 단어장</button>
      <button class="admin-tab" onclick="adminTab('records',this)">📊 기록</button>
      <button class="admin-tab" onclick="adminTab('settings',this)">🔧 설정</button>
    </div>
    <div class="content">
      <div id="admin-students"><!-- 학생 관리 --></div>
      <div id="admin-wordsets" style="display:none"><!-- 단어장 --></div>
      <div id="admin-records" style="display:none"><!-- 기록 --></div>
      <div id="admin-settings" style="display:none"><!-- 설정 --></div>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
// ════════════════════════════════════════════
// 🔧 설정 — 여기를 수정하세요
// ════════════════════════════════════════════
const CONFIG = {
  ADMIN_CODE: "admin1234",       // 관리자 코드 (원하는 것으로 변경)
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbyGmCYGdyHecZmfAtPHvgOHIQ90NS2cAl9ekW5qdybC0oyKx_uRVQ_szhtXNlYFEyEuWA/exec",
};

// ════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════
let STATE = {
  user: null,
  wordsets: [],
  students: [],
  records: [],
  quiz: {
    words: [], current: 0, correct: 0,
    wrongList: [], choices: [], correctIdx: -1,
    answered: false, setName: "",
    timer: null, autoTimer: null,
  }
};

// ════════════════════════════════════════════
// localStorage 헬퍼
// ════════════════════════════════════════════
function lget(k) { try { return JSON.parse(localStorage.getItem("vq2_"+k)); } catch { return null; } }
function lset(k,v) { try { localStorage.setItem("vq2_"+k, JSON.stringify(v)); } catch(e){} }

// ════════════════════════════════════════════
// Apps Script API (Google Sheets 연동)
// ════════════════════════════════════════════
function scriptConfigured() {
  return !!CONFIG.SCRIPT_URL;
}

async function scriptGet(action, params={}) {
  if (!scriptConfigured()) return null;
  try {
    const qs = new URLSearchParams({action, ...params}).toString();
    const res = await fetch(`${CONFIG.SCRIPT_URL}?${qs}`);
    const data = await res.json();
    return data.ok ? data.data : null;
  } catch { return null; }
}

async function scriptPost(payload) {
  if (!scriptConfigured()) return false;
  try {
    const res = await fetch(CONFIG.SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    return data.ok;
  } catch { return false; }
}

// ════════════════════════════════════════════
// 데이터 로드
// ════════════════════════════════════════════
async function loadStudents() {
  STATE.students = lget("students") || [];
  if (!scriptConfigured()) return;
  const data = await scriptGet("getStudents");
  if (data && data.length) {
    STATE.students = data;
    lset("students", STATE.students);
  }
}

async function loadWordsets() {
  STATE.wordsets = lget("wordsets") || [];
  renderWordsetList();
  if (!scriptConfigured()) return;
  const data = await scriptGet("getWordsets");
  if (data && data.length) {
    STATE.wordsets = data;
    lset("wordsets", STATE.wordsets);
  }
  renderWordsetList();
}

async function loadRecords() {
  STATE.records = lget("records") || [];
  if (!scriptConfigured()) return;
  const data = await scriptGet("getRecords");
  if (data && data.length) {
    STATE.records = data;
    lset("records", STATE.records);
  }
}

async function saveRecord(rec) {
  STATE.records.unshift(rec);
  lset("records", STATE.records);
  await scriptPost({ action: "saveRecord", record: rec });
}

// ════════════════════════════════════════════
// 화면 전환
// ════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

// ════════════════════════════════════════════
// 로그인 / 로그아웃
// ════════════════════════════════════════════
function doLogin() {
  const code = document.getElementById("login-input").value.trim();
  if (!code) return;

  if (code === CONFIG.ADMIN_CODE) {
    STATE.user = { code, name: "관리자", isAdmin: true };
    showScreen("admin-screen");
    renderAdmin();
    return;
  }

  // 학생 확인
  const found = STATE.students.find(s => s.code === code);
  if (found) {
    STATE.user = { code: found.code, name: found.name, isAdmin: false };
    document.getElementById("home-user-badge").textContent = found.name;
    showScreen("home-screen");
    loadWordsets();
    renderMyRecords();
  } else {
    document.getElementById("login-input").classList.add("shake");
    setTimeout(() => document.getElementById("login-input").classList.remove("shake"), 500);
    document.getElementById("login-input").value = "";
    showToast("❌ 등록되지 않은 코드예요");
  }
}

function doLogout() {
  STATE.user = null;
  document.getElementById("login-input").value = "";
  showScreen("login-screen");
}

function goHome() {
  showScreen("home-screen");
  renderMyRecords();
}

// ════════════════════════════════════════════
// 홈 — 단어장 목록
// ════════════════════════════════════════════
function renderWordsetList() {
  const el = document.getElementById("wordset-list");
  if (!STATE.wordsets.length) {
    el.innerHTML = `<div class="empty">등록된 단어장이 없어요<br>관리자에게 문의하세요</div>`;
    return;
  }
  el.innerHTML = STATE.wordsets.map(ws => `
    <div class="card">
      <div class="card-row" onclick="openSelectScreen('${ws.id}')">
        <div>
          <div class="card-main">${ws.name}</div>
          <div class="card-sub">${ws.words.length}개 단어${ws.lectures&&ws.lectures.length ? ` · ${ws.lectures.length}강` : ""}</div>
        </div>
        <div class="card-right">
          <span class="badge badge-blue">${ws.words.length}단어</span>
          <span class="card-arrow">›</span>
        </div>
      </div>
    </div>
  `).join("");
}

function renderMyRecords() {
  const el = document.getElementById("my-records-list");
  const mine = STATE.records.filter(r => r.studentCode === STATE.user?.code).slice(0,10);
  if (!mine.length) {
    el.innerHTML = `<div class="empty" style="padding:20px 0;">아직 기록이 없어요</div>`;
    return;
  }
  el.innerHTML = `<div class="card">${mine.map(r => {
    const pct = Math.round(r.correct/r.total*100);
    return `<div class="card-row no-hover">
      <div>
        <div class="card-main">${r.setName}</div>
        <div class="card-sub">${r.date}</div>
      </div>
      <div class="record-score">
        <span class="score-correct">✓${r.correct}</span>
        <span class="score-wrong">✗${r.wrong}</span>
        <span class="score-pct">${pct}%</span>
      </div>
    </div>`;
  }).join("")}</div>`;
}

// ════════════════════════════════════════════
// 퀴즈
// ════════════════════════════════════════════
function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

function openSelectScreen(wsId) {
  const ws = STATE.wordsets.find(w => w.id === wsId);
  if (!ws) return;
  document.getElementById("select-topbar-title").textContent = ws.name;
  const el = document.getElementById("select-content");

  // 강수 없으면 바로 시작
  if (!ws.lectures || ws.lectures.length === 0) {
    startQuiz(wsId, null);
    return;
  }

  const totalCount = ws.words.length;
  el.innerHTML = `
    <div class="section-header" style="margin-top:0">
      <span class="section-title">범위 선택</span>
    </div>
    <div class="card">
      <div class="card-row" onclick="startQuiz('${ws.id}', null)">
        <div>
          <div class="card-main">📚 전체</div>
          <div class="card-sub">모든 강 · ${totalCount}개 단어</div>
        </div>
        <span class="card-arrow">›</span>
      </div>
    </div>
    <div class="section-header"><span class="section-title">강별 선택</span></div>
    <div class="card">
      ${ws.lectures.map(lec => {
        const cnt = ws.words.filter(w => w.lecture === lec).length;
        return `<div class="card-row" onclick="startQuiz('${ws.id}', '${lec}')">
          <div>
            <div class="card-main">${lec}강</div>
            <div class="card-sub">${cnt}개 단어</div>
          </div>
          <span class="card-arrow">›</span>
        </div>`;
      }).join("")}
    </div>
    <div class="section-header"><span class="section-title">여러 강 묶어서 선택</span></div>
    <div id="multi-lec-wrap">
      <div class="edit-box">
        <div class="edit-box-title" style="margin-bottom:10px">강 선택 (여러 개 가능)</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
          ${ws.lectures.map(lec => `
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:13px">
              <input type="checkbox" value="${lec}" style="accent-color:var(--accent)"> ${lec}강
            </label>`).join("")}
        </div>
        <button class="btn btn-success" style="font-size:13px;padding:8px 16px" onclick="startMultiLec('${ws.id}')">선택한 강 테스트 →</button>
      </div>
    </div>
  `;
  showScreen("select-screen");
}

function startMultiLec(wsId) {
  const checked = [...document.querySelectorAll("#multi-lec-wrap input:checked")].map(i => i.value);
  if (checked.length === 0) { showToast("강을 하나 이상 선택하세요"); return; }
  const ws = STATE.wordsets.find(w => w.id === wsId);
  const filteredWords = ws.words.filter(w => checked.includes(w.lecture));
  if (filteredWords.length < 4) { showToast("선택한 강의 단어가 4개 미만이에요"); return; }
  const label = checked.length === 1 ? `${ws.name} ${checked[0]}강` : `${ws.name} ${checked[0]}~${checked[checked.length-1]}강`;
  _doStartQuiz(filteredWords, label, ws);
}

function startQuiz(wsId, lecture) {
  const ws = STATE.wordsets.find(w => w.id === wsId);
  if (!ws) return;
  let words = ws.words;
  let label = ws.name;
  if (lecture !== null && lecture !== undefined && lecture !== "") {
    words = ws.words.filter(w => w.lecture === lecture);
    label = `${ws.name} ${lecture}강`;
  }
  if (words.length < 4) { showToast("단어가 4개 이상 필요해요"); return; }
  _doStartQuiz(words, label, ws);
}

function _doStartQuiz(words, label, ws) {
  const q = STATE.quiz;
  q.words = shuffle(words).slice(0, Math.min(words.length, 20));
  q.allWords = ws.words; // 보기 생성에 전체 단어 풀 사용
  q.wsId = ws.id;
  q.current = 0; q.correct = 0; q.wrongList = []; q.setName = label;
  document.getElementById("quiz-topbar-title").textContent = label;
  showScreen("quiz-screen");
  renderQuestion();
}

function renderQuestion() {
  const q = STATE.quiz;
  const word = q.words[q.current];
  const total = q.words.length;

  document.getElementById("q-progress").textContent = `${q.current+1} / ${total}`;
  document.getElementById("q-correct-count").textContent = `✓ ${q.correct}`;
  document.getElementById("q-progress-fill").style.width = `${(q.current/total)*100}%`;
  document.getElementById("q-word").textContent = word.word;
  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").textContent = "";

  // 보기 생성
  const pool = (STATE.quiz.allWords || STATE.wordsets.flatMap(ws=>ws.words)).filter(w=>w.meaning!==word.meaning);
  const distractors = shuffle(pool).slice(0,3);
  q.choices = shuffle([word, ...distractors]);
  q.correctIdx = q.choices.findIndex(c=>c.meaning===word.meaning);
  q.answered = false;

  const nums = ["①","②","③","④"];
  document.getElementById("choices").innerHTML = q.choices.map((c,i)=>
    `<button class="choice-btn" onclick="pickAnswer(${i})">
      <span class="choice-num">${nums[i]}</span>
      <span>${c.meaning}</span>
    </button>`
  ).join("");

  // 타이머
  clearTimeout(q.timer); clearTimeout(q.autoTimer);
  let t = 5;
  const fill = document.getElementById("timer-fill");
  const num = document.getElementById("timer-num");
  fill.style.transition = "none";
  fill.style.width = "100%";
  fill.style.backgroundColor = "var(--green)";
  num.textContent = t;

  setTimeout(() => {
    fill.style.transition = "width 0.95s linear, background-color 0.3s";
    tick();
  }, 50);

  function tick() {
    if (q.answered) return;
    t--;
    num.textContent = t;
    fill.style.width = `${(t/5)*100}%`;
    fill.style.backgroundColor = t<=1 ? "var(--red)" : t<=2 ? "var(--yellow)" : "var(--green)";
    if (t <= 0) { pickAnswer(null); return; }
    q.timer = setTimeout(tick, 1000);
  }
}

function pickAnswer(idx) {
  const q = STATE.quiz;
  if (q.answered) return;
  q.answered = true;
  clearTimeout(q.timer);

  const word = q.words[q.current];
  const isCorrect = idx !== null && idx === q.correctIdx;
  if (isCorrect) q.correct++;
  else q.wrongList.push(word);

  // 버튼 색상
  document.querySelectorAll(".choice-btn").forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correctIdx) btn.classList.add("correct");
    else if (i === idx && !isCorrect) btn.classList.add("wrong");
    else btn.classList.add("dimmed");
  });

  // 피드백
  const fb = document.getElementById("feedback");
  if (idx === null) {
    fb.textContent = "⏰ 시간 초과!";
    fb.className = "feedback wrong show";
  } else if (isCorrect) {
    fb.textContent = "✅ 정답!";
    fb.className = "feedback correct show";
  } else {
    fb.textContent = `❌ 오답  |  정답: ${word.meaning}`;
    fb.className = "feedback wrong show";
  }

  // 1초 후 자동 이동
  q.autoTimer = setTimeout(() => {
    q.current++;
    if (q.current >= q.words.length) finishQuiz();
    else renderQuestion();
  }, 1000);
}

function exitQuiz() {
  clearTimeout(STATE.quiz.timer);
  clearTimeout(STATE.quiz.autoTimer);
  goHome();
}

async function finishQuiz() {
  const q = STATE.quiz;
  const total = q.words.length;
  const rec = {
    id: Date.now().toString(),
    studentCode: STATE.user.code,
    studentName: STATE.user.name,
    setName: q.setName, total,
    correct: q.correct,
    wrong: total - q.correct,
    wrongWords: q.wrongList,
    date: new Date().toLocaleString("ko-KR"),
  };
  await saveRecord(rec);
  renderResult(rec);
  showScreen("result-screen");
}

// ════════════════════════════════════════════
// 결과
// ════════════════════════════════════════════
function renderResult(rec) {
  const pct = Math.round(rec.correct/rec.total*100);
  const grade = pct===100?"🏆 만점!":pct>=80?"🌟 훌륭해요!":pct>=60?"📚 조금만 더!":"💪 다시 도전!";
  const deg = Math.round(pct/100*360);

  const el = document.getElementById("result-content");
  el.innerHTML = `
    <div class="result-hero">
      <div class="score-circle" style="background:conic-gradient(var(--accent) ${deg}deg, var(--surface2) 0deg)">
        <div class="score-inner">
          <div class="score-pct-big">${pct}<span class="score-pct-unit">%</span></div>
        </div>
      </div>
      <div class="grade-text">${grade}</div>
      <div class="grade-sub">${rec.setName} · ${rec.date}</div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-n">${rec.total}</div><div class="stat-l">총 문제</div></div>
        <div class="stat-box" style="border-color:rgba(63,185,80,0.3)"><div class="stat-n" style="color:var(--green)">${rec.correct}</div><div class="stat-l">정답</div></div>
        <div class="stat-box" style="border-color:rgba(248,81,73,0.3)"><div class="stat-n" style="color:var(--red)">${rec.wrong}</div><div class="stat-l">오답</div></div>
      </div>
    </div>
    ${rec.wrongWords.length ? `
    <div class="wrong-section">
      <div class="wrong-header">
        <span class="wrong-title">틀린 단어 (${rec.wrongWords.length}개)</span>
        <button class="copy-btn" onclick="copyWrong(${JSON.stringify(rec).replace(/"/g,'&quot;')})">📋 복사</button>
      </div>
      ${rec.wrongWords.map(w=>`
        <div class="wrong-item">
          <span class="wrong-word">${w.word}</span>
          <span class="wrong-meaning">${w.meaning}</span>
        </div>`).join("")}
    </div>` : ""}
    <div class="result-btns">
      <button class="btn btn-primary" onclick="openSelectScreen('${STATE.quiz.wsId||''}')">🔄 다시 풀기</button>
      <button class="btn btn-ghost" onclick="goHome()">← 목록으로</button>
    </div>
  `;
}

function copyWrong(rec) {
  const pct = Math.round(rec.correct/rec.total*100);
  const text = [
    `[단어 테스트 결과] ${rec.setName} — ${rec.date}`,
    `총 ${rec.total}문제 | 정답 ${rec.correct}개 | 오답 ${rec.wrong}개 | ${pct}%`,
    "",
    "틀린 단어:",
    ...rec.wrongWords.map(w=>`  • ${w.word} = ${w.meaning}`)
  ].join("\n");
  clipCopy(text, "📋 클립보드에 복사했어요!");
}

function clipCopy(text, msg) {
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(()=>showToast(msg)).catch(()=>fallbackCopy(text,msg));
  } else { fallbackCopy(text,msg); }
}
function fallbackCopy(text, msg) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand("copy"); showToast(msg); } catch { showToast("복사 실패 — 직접 선택해주세요"); }
  document.body.removeChild(ta);
}

// ════════════════════════════════════════════
// 관리자
// ════════════════════════════════════════════
function adminTab(name, btn) {
  ["students","wordsets","records","settings"].forEach(t => {
    document.getElementById("admin-"+t).style.display = t===name?"block":"none";
  });
  document.querySelectorAll(".admin-tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  if (name==="records") renderAdminRecords();
}

async function renderAdmin() {
  await Promise.all([loadStudents(), loadWordsets(), loadRecords()]);
  renderAdminStudents();
  renderAdminWordsets();
  renderAdminSettings();
}

// ── 학생 관리 ──
function renderAdminStudents() {
  const el = document.getElementById("admin-students");
  el.innerHTML = `
    <div class="section-header" style="margin-top:0">
      <span class="section-title">학생 등록</span>
    </div>
    <div class="edit-box">
      <div class="form-row">
        <input class="form-input" id="new-s-code" placeholder="학생 코드 (예: st001)" style="max-width:140px">
        <input class="form-input" id="new-s-name" placeholder="이름">
        <button class="btn btn-success" onclick="addStudent()">추가</button>
      </div>
    </div>
    <div class="section-header">
      <span class="section-title">학생 목록 (${STATE.students.length}명)</span>
      ${scriptConfigured()?`<span class="badge badge-blue">시트 연동됨</span>`:""}
    </div>
    ${STATE.students.length ? `<div class="card">${STATE.students.map(s=>`
      <div class="card-row no-hover">
        <div>
          <div class="card-main">${s.name}</div>
          <div class="card-sub">${s.code}</div>
        </div>
        <button class="btn btn-danger" style="padding:5px 10px;font-size:12px" onclick="removeStudent('${s.code}')">삭제</button>
      </div>`).join("")}</div>`
    : `<div class="empty">학생이 없어요</div>`}
  `;
}

async function addStudent() {
  const code = document.getElementById("new-s-code").value.trim();
  const name = document.getElementById("new-s-name").value.trim();
  if (!code || !name) { showToast("코드와 이름을 모두 입력하세요"); return; }
  if (STATE.students.find(s=>s.code===code)) { showToast("이미 있는 코드예요"); return; }
  showToast("⏳ 저장 중...");
  STATE.students.push({code,name});
  lset("students", STATE.students);
  await scriptPost({ action: "addStudent", code, name });
  renderAdminStudents();
  showToast("✅ 학생 추가 완료");
}

async function removeStudent(code) {
  if (!confirm("삭제할까요?")) return;
  STATE.students = STATE.students.filter(s=>s.code!==code);
  lset("students", STATE.students);
  await scriptPost({ action: "saveStudents", students: STATE.students });
  renderAdminStudents();
  showToast("🗑️ 삭제됐어요");
}

// ── 단어장 ──
let editingWsId = null;

function renderAdminWordsets() {
  const el = document.getElementById("admin-wordsets");
  el.innerHTML = `
    <div class="section-header" style="margin-top:0">
      <span class="section-title">단어장 (${STATE.wordsets.length}개)</span>
      <button class="btn btn-success" style="padding:6px 12px;font-size:12px" onclick="showWsEditor(null)">+ 새 단어장</button>
    </div>
    <div id="ws-editor-wrap"></div>
    ${STATE.wordsets.length ? `<div class="card">${STATE.wordsets.map(ws=>`
      <div class="card-row no-hover">
        <div>
          <div class="card-main">${ws.name}</div>
          <div class="card-sub">${ws.words.length}개 단어</div>
        </div>
        <div class="card-right">
          <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px" onclick="showWsEditor('${ws.id}')">편집</button>
          <button class="btn btn-danger" style="padding:5px 10px;font-size:12px" onclick="deleteWs('${ws.id}')">삭제</button>
        </div>
      </div>`).join("")}</div>`
    : `<div class="empty">단어장이 없어요</div>`}
  `;
}

function showWsEditor(wsId) {
  editingWsId = wsId;
  const ws = wsId ? STATE.wordsets.find(w=>w.id===wsId) : null;
  document.getElementById("ws-editor-wrap").innerHTML = `
    <div class="edit-box" style="margin-bottom:16px">
      <div class="edit-box-title">${ws?"단어장 편집":"새 단어장"}</div>
      <input class="form-input" id="ws-name-input" placeholder="단어장 이름" value="${ws?ws.name:""}" style="width:100%;margin-bottom:10px">
      <textarea class="form-textarea" id="ws-words-input" placeholder="단어 = 뜻 형식으로 입력 (한 줄에 하나씩)&#10;&#10;apple = 사과&#10;banana = 바나나&#10;computer = 컴퓨터">${ws?ws.words.map(w=>`${w.word} = ${w.meaning}`).join("\n"):""}</textarea>
      <p class="form-hint">💡 형식: 단어 = 뜻   또는   단어,뜻</p>
      <div class="form-row" style="margin-top:10px;margin-bottom:0">
        <button class="btn btn-success" onclick="saveWs()">💾 저장</button>
        <button class="btn btn-ghost" onclick="document.getElementById('ws-editor-wrap').innerHTML=''">취소</button>
      </div>
    </div>
  `;
}

function parseWordsText(raw) {
  return raw.split("\n").map(l=>l.trim()).filter(Boolean).map(l=>{
    const sep = l.includes("=")?"=":","
    const p = l.split(sep); if(p.length<2)return null;
    return {word:p[0].trim(),meaning:p.slice(1).join(sep).trim()};
  }).filter(Boolean);
}

async function saveWs() {
  const name = document.getElementById("ws-name-input").value.trim();
  const words = parseWordsText(document.getElementById("ws-words-input").value);
  if (!name) { showToast("단어장 이름을 입력하세요"); return; }
  if (words.length < 4) { showToast("단어를 4개 이상 입력하세요"); return; }

  showToast("⏳ 저장 중...");
  const lectures = [...new Set(words.map(w=>w.lecture).filter(Boolean))].sort((a,b)=>Number(a)-Number(b)||a.localeCompare(b));
  const id = editingWsId || "ws_" + name.replace(/\s+/g,"_");

  if (editingWsId) {
    STATE.wordsets = STATE.wordsets.map(w=>w.id===editingWsId?{...w,name,words,lectures}:w);
  } else {
    STATE.wordsets.push({id, name, words, lectures});
  }
  lset("wordsets", STATE.wordsets);
  await scriptPost({ action: "saveWordset", name: editingWsId ? editingWsId.replace("ws_","") : name, words });

  document.getElementById("ws-editor-wrap").innerHTML = "";
  renderAdminWordsets();
  showToast("✅ 단어장 저장됨");
}

async function deleteWs(id) {
  if (!confirm("단어장을 삭제할까요?")) return;
  const ws = STATE.wordsets.find(w=>w.id===id);
  STATE.wordsets = STATE.wordsets.filter(w=>w.id!==id);
  lset("wordsets", STATE.wordsets);
  if (ws) await scriptPost({ action: "deleteWordset", name: ws.name });
  renderAdminWordsets();
  showToast("🗑️ 삭제됐어요");
}

// ── 기록 ──
function renderAdminRecords() {
  const el = document.getElementById("admin-records");
  const recs = STATE.records;
  el.innerHTML = `
    <div class="section-header" style="margin-top:0">
      <span class="section-title">전체 기록 (${recs.length}건)</span>
      <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px" onclick="copyAllRecords()">📋 전체 복사</button>
    </div>
    ${recs.length?`<div class="card">${recs.slice(0,50).map(r=>{
      const pct=Math.round(r.correct/r.total*100);
      return `<div class="card-row no-hover">
        <div style="flex:1;min-width:0">
          <div class="card-main">${r.studentName} <span style="color:var(--text2);font-size:12px;font-weight:400">${r.studentCode}</span></div>
          <div class="card-sub">${r.setName} · ${r.date}</div>
          ${r.wrongWords?.length?`<div style="font-size:11px;color:var(--red);margin-top:2px">틀린 단어: ${r.wrongWords.map(w=>w.word).join(", ")}</div>`:""}
        </div>
        <div class="record-score" style="flex-shrink:0;margin-left:8px">
          <span class="score-correct">✓${r.correct}</span>
          <span class="score-wrong">✗${r.wrong}</span>
          <span class="score-pct">${pct}%</span>
        </div>
      </div>`;
    }).join("")}</div>`:`<div class="empty">기록이 없어요</div>`}
  `;
}

function copyAllRecords() {
  const lines = STATE.records.map(r =>
    `${r.date} | ${r.studentName}(${r.studentCode}) | ${r.setName} | ${r.correct}/${r.total} (${Math.round(r.correct/r.total*100)}%) | 틀린: ${r.wrongWords?.map(w=>w.word).join(", ")||"없음"}`
  ).join("\n");
  clipCopy(lines, "📋 전체 기록 복사 완료!");
}

    </div>

      <div class="card-row no-hover"><div><div class="card-main">records 시트</div><div class="card-sub">자동 생성 및 저장됨</div></div></div>

        <div class="card-main" style="color:var(--red)">🗑️ 전체 기록 초기화</div>
        <span class="card-arrow">›</span>
      </div>

  `;

// ════════════════════════════════════════════
// 토스트
// ════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
}

  await loadStudents();
  // 엔터키 로그인
  document.getElementById("login-input").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });
}

init();
